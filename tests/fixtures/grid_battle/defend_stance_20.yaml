# DEFEND_STANCE damage reduction fixture — primary case
# Used by: AC-GB-10b case (1)-(3)
# Seed authored: 2026-04-19 (v5.0 session)
#
# Exercises: hp-status.md F-4 DEFEND_STANCE reduction at the default value
# (registry: defend_stance_reduction = 50). Input resolved_damage from
# damage_resolve = 20; expected HP delta after F-4 = 10 (floor(20 * 0.5)).

scenario:
  attacker:
    atk: 40
    class_id: INFANTRY
    facing: EAST
  defender:
    atk: 30
    def: 20
    max_hp: 100
    current_hp: 100
    class_id: INFANTRY
    facing: WEST
    status_effects:
      - type: DEFEND_STANCE
        remaining_turns: 1
        stacks: 1
    acted_this_turn: true              # DEFEND sets acted=true per CR-13 rule 5 (v5.0)
  modifiers:
    attack_type: PHYSICAL
    direction_rel: FRONT
    is_counter: false
    skill_id: ""
    rng_seed: 20202
    terrain_def: 0
    terrain_evasion: 0

expected:
  # damage-calc output (grid-battle's input to HP/Status): owned by damage-calc fixtures
  # (AC-DC-02-family). Here we assert only the HP/Status integration contract.
  damage_resolve_returns_hit: true
  damage_resolve_resolved_damage: 20   # documented for reader clarity; asserted in AC-DC-*
  # HP/Status apply_damage:
  hp_delta: 10                         # max(MIN_DAMAGE=1, floor(20 * 0.5)) = 10
  defender_current_hp_after: 90
  # Counter suppression per CR-13 rule 4 (v5.0):
  counter_attack_triggered_emit_count: 0
  # Stance lifecycle:
  defend_stance_remaining_turns_after: 1   # clears at next unit_turn_started, not on hit
