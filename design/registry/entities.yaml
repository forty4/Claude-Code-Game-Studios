# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: damage_intake_pipeline
    status: active
    source: design/gdd/hp-status.md
    referenced_by:
      - design/gdd/hp-status.md
    variables:
      - resolved_damage
      - attack_type
      - passive_tags
      - SHIELD_WALL_FLAT
      - MIN_DAMAGE
    output_range: [1, 999]
    expression: "final_damage = max(MIN_DAMAGE, resolved_damage - passive_flat_reduction); current_hp = max(0, current_hp - final_damage)"
    notes: "Intake-only pipeline. Damage Calc owns ATK/DEF/terrain/direction. HP/Status owns
      Shield Wall flat reduction, status effect modifiers, min damage floor, and HP reduction."
    added: 2026-04-16
    revised: ""

  - name: healing_formula
    status: active
    source: design/gdd/hp-status.md
    referenced_by:
      - design/gdd/hp-status.md
    variables:
      - HEAL_BASE
      - max_hp
      - HEAL_HP_RATIO
      - HEAL_PER_USE_CAP
      - EXHAUSTED_HEAL_MULT
    output_range: [1, 50]
    expression: "heal_amount = clamp(floor(HEAL_BASE + ceil(max_hp × HEAL_HP_RATIO)), 1, HEAL_PER_USE_CAP)"
    notes: "EXHAUSTED halves heal (min 1). Overheal prevention: min(raw_heal, max_hp - current_hp)."
    added: 2026-04-16
    revised: ""

  - name: stat_polarization_index
    status: active
    source: design/gdd/hero-database.md
    referenced_by:
      - design/gdd/hero-database.md
    variables:
      - stat_max
      - stat_min
      - stat_avg
    output_range: [0.0, 3.3]
    expression: "(stat_max - stat_min) / stat_avg"
    notes: "SPI < 0.5 triggers 'too flat' design warning. Used to enforce Pillar 3
      (Every Hero Has a Role) — heroes must be specialized, not generalists."
    added: 2026-04-16
    revised: ""

  - name: resolve_branch
    status: active
    source: design/gdd/scenario-progression.md
    referenced_by:
      - design/gdd/scenario-progression.md
      - design/gdd/destiny-branch.md   # EXECUTES F-SP-1 inside DestinyBranchJudge.resolve() per F-DB-1 assembly algorithm; consumes branch_key + is_draw_fallback; does NOT re-implement the formula per registry contract (added 2026-04-19)
    variables:
      - chapter
      - outcome           # Result enum {WIN, DRAW, LOSS}
      - echo_count
      - chapter.author_draw_branch
      - chapter.branch_table
    output_range: ["{branch_key:String, is_draw_fallback:bool, cue_tag:String|null}"]
    expression: "F-SP-1: if outcome==DRAW AND NOT chapter.author_draw_branch → reuse WIN branch + cue_tag='draw_fallback'; else exact match (outcome, echo_count_bucket) on chapter.branch_table."
    notes: "Scenario Progression is the sole owner of branch resolution. Destiny Branch #4 will
      consume branch_key from this formula; MUST NOT re-implement the DRAW-fallback branch
      by pattern. Cross-GDD contract: chapter.branch_table MUST include one entry per
      outcome ∈ {WIN, LOSS} at minimum; DRAW entries required iff author_draw_branch==true."
    added: 2026-04-18
    revised: ""

  - name: is_echo_gate_open
    status: active
    source: design/gdd/scenario-progression.md
    referenced_by:
      - design/gdd/scenario-progression.md
      - design/gdd/destiny-branch.md   # DestinyBranchJudge invokes this predicate transitively via F-SP-1; MUST NOT re-derive per registry contract (added 2026-04-19)
    variables:
      - outcome           # Result enum {WIN, DRAW, LOSS}
      - echo_count
      - echo_threshold
    output_range: [false, true]
    expression: "F-SP-2: (outcome == DRAW) AND (echo_count >= echo_threshold)"
    notes: "Echo-gate predicate. Clean DRAW (echo_count == 0) excluded by contract (CR-8).
      Ch1 rejects any echo_threshold field (CR-13) — authoring validator enforces.
      Destiny Branch #4 and Destiny State #16 MUST call this predicate, not re-derive it."
    added: 2026-04-18
    revised: ""

  - name: scenario_path_key_composition
    status: active
    source: design/gdd/scenario-progression.md
    referenced_by:
      - design/gdd/scenario-progression.md
    variables:
      - chapter_outcomes   # Array[{chapter_id, branch_path_id, echo_count_at_completion}]
    output_range: ["String (e.g., 'WIN_ch1_default-DRAW_ch2_fallback-DRAW_ch3_echo')"]
    expression: "F-SP-4: chapter_outcomes.map(c => c.branch_path_id).join('-')"
    notes: "Stable epilogue-variant key. Consumed by scenario_complete(ScenarioResult) and
      Save/Load #17 for save-slot metadata + epilogue selection. Destiny State #16 surfaces
      the same value in playthrough telemetry. Format is authoring-stable — never renumber."
    added: 2026-04-18
    revised: ""

  - name: damage_resolve
    status: active
    source: design/gdd/damage-calc.md
    referenced_by:
      - design/gdd/damage-calc.md
      - design/gdd/grid-battle.md   # sole caller; primary + counter exchange invokes resolve() twice
      - design/gdd/hp-status.md     # consumes ResolveResult.HIT.resolved_damage at apply_damage() boundary
      - design/gdd/unit-role.md     # CLASS_DIRECTION_MULT contract + EC-7 multiplicative ordering
      - design/gdd/terrain-effect.md  # provides terrain_def, terrain_evasion inputs
    variables:
      - attacker          # {unit_id, unit_class, charge_active, defend_stance_active, passives, raw_atk} — rev 2.5: class→unit_class (GDScript 4.6 reserved keyword)
      - defender          # {unit_id, terrain_def, terrain_evasion, raw_def}
      - modifiers         # {attack_type, direction_rel, is_counter, skill_id, rng}
      - ATK_CAP           # 200
      - DEF_CAP           # 100
      - MIN_DAMAGE        # 1
      - BASE_CEILING      # 83 (Stage 1 pre-direction cap; rev 2.4 lowered 100→83 for Pillar-1 math)
      - DAMAGE_CEILING    # 180 (Stage 2 post-direction cap; raised 150→180 in damage-calc.md rev 2)
      - COUNTER_ATTACK_MODIFIER  # 0.5
      - DEFEND_STANCE_ATK_PENALTY  # 40
      - MAX_DEFENSE_REDUCTION    # 30
      - MAX_EVASION              # 30
      - CHARGE_BONUS             # 1.20 (this GDD owns)
      - AMBUSH_BONUS             # 1.15 (this GDD owns)
      - CLASS_DIRECTION_MULT     # locked table from unit-role.md EC-7
    output_range: ["ResolveResult.HIT(resolved_damage: int [1, 180], source_flags: Array[StringName], vfx_tags: Array[StringName]) | ResolveResult.MISS(source_flags: Array[StringName])"]
    expression: "F-DC-1..7 stateless pipeline. Sketch: eff_atk = clamp(get_modified_stat(attacker, ATK), 1, ATK_CAP); eff_def = clamp(get_modified_stat(defender, DEF), 0, DEF_CAP); if defend_stance_active: eff_atk = floori(eff_atk * (1 - DEFEND_STANCE_ATK_PENALTY/100)); defense_mul = snappedf(1.0 - clamp(terrain_def, -30, 30)/100, 0.01); base = clamp(max(MIN_DAMAGE, floori(eff_atk - eff_def * defense_mul)), 1, BASE_CEILING); D_mult = snappedf(CLASS_DIRECTION_MULT[unit_class][direction_rel], 0.01); P_mult = snappedf(charge_factor * ambush_factor, 0.01); raw = clamp(floori(base * D_mult * P_mult), 1, DAMAGE_CEILING); if is_counter: raw = max(MIN_DAMAGE, floori(raw * COUNTER_ATTACK_MODIFIER)); return HIT(raw, ...). MISS branch: roll = rng.randi_range(1, 100); if roll <= clamp(terrain_evasion, 0, MAX_EVASION) AND NOT is_counter: return MISS(). Skill stub (skill_id != \"\"): return MISS() + source_flags ∋ 'skill_unresolved' (RNG NOT consumed). Guard failures (rng==null, unknown unit_class, unknown direction, illegal attack_type): push_error + MISS() with source_flags ∋ 'invariant_violation:<reason>' (rev 2.4 flagged-MISS redesign)."
    notes: "Sole entry point for all PHYSICAL/MAGICAL damage resolution. Stateless synchronous service — emits ZERO signals (ADR-0001 §Damage Calc consumer-only). HP/Status owns the apply_damage write-path; Damage Calc never calls it directly. Counter-attack modeled as second resolve() call from Grid Battle with is_counter=true (NOT a {primary, counter} struct). DoT/POISON bypasses entirely — guard rejects attack_type ∉ {PHYSICAL, MAGICAL}. F-GB-PROV from grid-battle.md §CR-5 Step 7 is REPLACED by this formula and must be removed in same patch (AC-DC-44 enforces). Determinism: snappedf(_, 0.01) IEEE-754 quantization; randi_range inclusive on both ends; pinned for Godot 4.6 (AC-DC-49, AC-DC-50). Cross-platform (rev 2 — softened): same-platform replay is bit-identical; cross-platform (Windows D3D12 / macOS Metal / Linux Vulkan) establishes a known-good baseline — divergence is a regression to investigate (WARN), not a hard ship blocker (integer-only-math migration is a deferred ADR). See §Formulas determinism contract and AC-DC-25. Rev 2.5 (2026-04-19): field `class` renamed to `unit_class` (GDScript 4.6 reserved keyword avoidance per BLK-6-4); BASE_CEILING comment corrected from 100 to 83 to match rev 2.4 value; expression uses unit_class subscript."
    added: 2026-04-18
    revised: 2026-04-19

