    system: scene-manager
    adr: docs/architecture/ADR-0002-scene-manager.md
    requirement: "On async-load failure, SceneManager emits scene_transition_failed(context, reason) via GameBus and transitions to ERROR state. Recovery only via re-emit of battle_launch_requested."
    created: 2026-04-18
    revised: ""
    status: active

