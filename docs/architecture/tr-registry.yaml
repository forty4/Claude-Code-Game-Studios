    system: scene-manager
    adr: docs/architecture/ADR-0002-scene-manager.md
    requirement: "BattleScene instantiated as /root peer to Overworld using ResourceLoader.load_threaded_request (async). Status polled via Timer node at 100 ms cadence. NOT polled in _process."
