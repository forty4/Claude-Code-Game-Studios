    system: damage-calc
    gdd: design/gdd/damage-calc.md
    adr: docs/architecture/ADR-0012-damage-calc.md
    requirement: "AC-DC-37/46/47/50/51(b): Test infrastructure prerequisites — (1) headless CI per push for FORMULA/EDGE_CASE/CONTRACT/DETERMINISM/PERFORMANCE/TUNING/VERIFY-ENGINE/non-UI INTEGRATION (44 of 53 ACs). (2) Headed CI via xvfb-run weekly + every rc/* tag for AC-DC-46/47 UI INTEGRATION ACs. (3) Cross-platform determinism matrix macOS-Metal per-push baseline + Windows-D3D12 + Linux-Vulkan weekly + rc/* (AC-DC-37 softened to WARN-not-fail, AC-DC-50 hard-fail). (4) GdUnitTestSuite extends Node base required for AC-DC-51(b) bypass-seam (@onready Node-only in 4.6). (5) gdUnit4 addon pinned at 4.x version matching Godot 4.6 LTS, recorded in tests/README.md and CLAUDE.md."
    created: 2026-04-26
    revised: ""
    status: active

  - id: TR-damage-calc-011
    system: damage-calc
    gdd: design/gdd/damage-calc.md
    adr: docs/architecture/ADR-0012-damage-calc.md
    requirement: "AC-DC-49 + AC-DC-50 + Verify-against-engine: Two engine-contract pin tests mandatory on every push (headless CI) and every cross-platform matrix run. AC-DC-49: randi_range(from, to) inclusive on both ends — pattern `for i in 1000: assert(rng.randi_range(1, 1) == 1); assert(rng.randi_range(1, 100) ∈ [1, 100])`. AC-DC-50: snappedf(0.005, 0.01) == 0.01 AND snappedf(-0.005, 0.01) == -0.01 (round-half-away-from-zero). Cross-platform divergence on AC-DC-50 boundary residue is critical-tier WARN per AC-DC-37 softened-determinism contract."
    created: 2026-04-26
    revised: ""
    status: active

  - id: TR-damage-calc-012
    system: damage-calc
    gdd: design/gdd/damage-calc.md
    adr: docs/architecture/ADR-0012-damage-calc.md
    requirement: "CR-11 + AC-DC-36: source_flags mutation semantics — resolve() ALWAYS constructs a NEW Array[StringName] for ResolveResult.source_flags, copying from modifiers.source_flags via .duplicate() and appending internal flags (counter, charge, ambush, evasion, invariant_violation:reason). NEVER mutates the caller's modifiers.source_flags. Tests can re-call resolve() with the same modifiers without observing flag accumulation. Error-flag vocabulary: rng_null, bad_attack_type, unknown_direction, unknown_class — assert via result.source_flags.has(&\"invariant_violation:rng_null\"), never via Engine.get_error_count() (fabricated API)."
    created: 2026-04-26
    revised: ""
    status: active

  - id: TR-damage-calc-013
    system: damage-calc
    gdd: design/gdd/damage-calc.md
    adr: docs/architecture/ADR-0012-damage-calc.md
    requirement: "AC-DC-40(a) + AC-DC-40(b) + AC-DC-41: Performance budgets. (a) 10,000 calls in headless CI under 500ms (50µs avg per resolve() — Vertical Slice blocker). (b) Mobile p99 < 1ms on minimum-spec device (ARMv8, ≥4GB RAM, Adreno 610 / Mali-G57 class, Android 12+/iOS 15+) — Beta blocker, KEEP-through-implementation. Memory: zero Dictionary allocations inside resolve() body except build_vfx_tags helper (AC-DC-41 static lint via grep — 0 matches for `Dictionary(` and standalone `{` in reachable resolve() functions). 4 RefCounted wrapper allocations per call (deterministic free at scope exit, no GC pause)."
