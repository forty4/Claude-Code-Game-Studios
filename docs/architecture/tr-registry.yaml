    requirement: "CR-11 + AC-DC-36: source_flags mutation semantics — resolve() ALWAYS constructs a NEW Array[StringName] for ResolveResult.source_flags, copying from modifiers.source_flags via .duplicate() and appending internal flags (counter, charge, ambush, evasion, invariant_violation:reason). NEVER mutates the caller's modifiers.source_flags. Tests can re-call resolve() with the same modifiers without observing flag accumulation. Error-flag vocabulary: rng_null, bad_attack_type, unknown_direction, unknown_class — assert via result.source_flags.has(&\"invariant_violation:rng_null\"), never via Engine.get_error_count() (fabricated API)."
