    requirement: "CR-3 + Section F: Five cross-system READ-ONLY upstream interfaces. (1) HP/Status: get_modified_stat(unit_id: StringName, stat_name: String) -> int (provisional ADR-0010). (2) Terrain Effect: get_combat_modifiers(atk: Vector2i, def: Vector2i) -> CombatModifiers with already-clamped terrain_def ∈ [-30,+30] / terrain_evasion ∈ [0,30] (ADR-0008 Accepted). (3) Unit Role: BASE_DIRECTION_MULT[3] + CLASS_DIRECTION_MULT[4][3] compile-time const tables (provisional ADR-0009). (4) Turn Order: get_acted_this_turn(unit_id: StringName) -> bool (provisional ADR-0011). (5) Balance/Data: DataRegistry.get_const(key: String) -> Variant (provisional ADR-0006). Each upstream ADR ratifies (not negotiates) the locked interface; narrowing change triggers reciprocal ADR-0012 amendment."
    created: 2026-04-26
    revised: ""
    status: active

