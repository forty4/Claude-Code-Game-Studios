    revised: ""
    status: active

  - id: TR-scene-manager-004
    system: scene-manager
    adr: docs/architecture/ADR-0002-scene-manager.md
    requirement: "On battle_outcome_resolved, BattleScene freed via call_deferred('_free_battle_scene_and_restore_overworld') — defers free one additional frame to preserve co-subscriber deferred-handler node references."
