    requirement: "§4 + §Engine Compatibility verification 1: Global caps via BalanceConstants.get_const(key) per ADR-0006. 10 constants consumed: ATK_CAP=200, DEF_CAP=100, HP_CAP=300, HP_SCALE=2.0, HP_FLOOR=50, INIT_CAP=200, INIT_SCALE=2.0, MOVE_RANGE_MIN=2, MOVE_RANGE_MAX=6, MOVE_BUDGET_PER_RANGE=10. UnitRole MUST use BalanceConstants accessor — zero direct reads of balance_entities.json. G-15 test isolation obligation: every UnitRole test suite calling any method that transitively reads BalanceConstants MUST reset _cache_loaded = false in before_test() per ADR-0006 §6 + .claude/rules/godot-4x-gotchas.md G-15. Static-lint check: grep -L '_cache_loaded = false' tests/unit/foundation/unit_role*.gd returns empty."
