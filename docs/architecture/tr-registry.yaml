  - id: TR-damage-calc-002
    system: damage-calc
    gdd: design/gdd/damage-calc.md
    adr: docs/architecture/ADR-0012-damage-calc.md
    requirement: "CR-1 + CONTRACT rev 2.2: Type boundary — 4 typed RefCounted wrappers (AttackerContext, DefenderContext, ResolveModifiers, ResolveResult) with class_name + static make() factories. Replaces grid-battle.md lines 807-816 Dictionary payload. Array[StringName] discipline mandatory on .passives / .source_flags / .vfx_tags. Enforcement is runtime (assignment / insertion / parameter-bind time), NOT parse-time — per godot-specialist 2026-04-26 Item 2. StringName literal &foo comparison is the release-build defense (rejects String elements at F-DC-5). Forbidden alternative: Dictionary payload (registered as forbidden_pattern damage_calc_dictionary_payload)."
