    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§4 Per-class config schema and loading: assets/data/config/unit_roles.json (this system's config, parallel to ADR-0008's terrain_config.json). 6 class entries × 12 fields per class (primary_stat, secondary_stat, w_primary, w_secondary, class_atk_mult, class_phys_def_mult, class_mag_def_mult, class_hp_mult, class_init_mult, class_move_delta, passive_tag, terrain_cost_table[6], class_direction_mult[3]). Lazy-init via instance-form JSON.new().parse() (line/col diagnostics). Safe-default fallback per ADR-0008 precedent: missing/malformed config → push_error + populate hardcoded defaults matching GDD CR-1+CR-4+CR-6a values. Cache persists for GDScript engine session (mirrors ADR-0006 §6 BalanceConstants behavior). Hot-reload requires editor restart in MVP per AC-21 documented limitation."
