    revised: ""
    status: active

  - id: TR-unit-role-008
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§5 R-1 mitigation: PackedFloat32Array per-call copy semantics. Godot 4.x COW (copy-on-write) handles per-call copy naturally for PackedFloat32Array returned from a static method. UnitRole MUST NOT cache and return a shared backing array — GDScript has no const reference enforcement, and a caller mutating a cached array would silently corrupt subsequent calls. Codified as forbidden_pattern unit_role_returned_array_mutation in docs/registry/architecture.yaml. Mandatory unit test tests/unit/foundation/unit_role_test.gd::test_get_class_cost_table_caller_mutation_isolated: fetch table, mutate returned array, fetch again, assert original values returned. Source-comment in unit_role.gd above the method: '# RETURNS PER-CALL COPY — DO NOT cache and return shared array.'"
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-009
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§7 Passive tag canonicalization: 6 StringName tags locked as canonical passive set — &\"passive_charge\" (CAVALRY), &\"passive_shield_wall\" (INFANTRY), &\"passive_high_ground_shot\" (ARCHER), &\"passive_tactical_read\" (STRATEGIST), &\"passive_rally\" (COMMANDER), &\"passive_ambush\" (SCOUT). Exposed via const PASSIVE_TAG_BY_CLASS: Dictionary keyed by UnitClass enum int. Array[StringName] is the mandatory typed-array form for any consumer assembling passive-tag sets per ADR-0012 forbidden_pattern damage_calc_dictionary_payload (Array[String] is silent-wrong-answer hole — see ADR-0012 EC-DC-25 / AC-DC-51). Adding a 7th passive requires ADR-0009 amendment + propagate-design-change against unit-role.md (CR-2) + damage-calc.md + AI ADR."
    created: 2026-04-28
    revised: ""
    status: active

