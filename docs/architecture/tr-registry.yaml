    requirement: "CR-2 + EC-DC-14 + AC-DC-39: RNG ownership — per-call seeded injection via ResolveModifiers.rng (typed RandomNumberGenerator, never Variant). Call-count-stable contract: 1 randi_range per non-counter attack (Stage-0 evasion roll, F-DC-2), 0 per counter attack (skip evasion per CR-2), 0 per skill-stub MISS (F-DC-1 early return). Damage Calc never owns or mutates RNG state; Save/Load #21 snapshots Grid Battle's RNG handle, replay reproduces bit-identical outputs."
