    adr: docs/architecture/ADR-0012-damage-calc.md
    requirement: "CR-6/CR-8/CR-9 + F-DC-3/F-DC-5/F-DC-6: Three-tier cap layering composes multiplicatively in non-negotiable order — BASE_CEILING=83 pre-multipliers (Stage-1 ceiling) → P_MULT_COMBINED_CAP=1.31 post-passive-composition (Stage-2.5 cap, rev 2.9 NEW) → DAMAGE_CEILING=180 final (Stage-3 ceiling). Apex arithmetic: Cavalry REAR + Charge + Rally(+10%) + Formation(+5%) → D_mult=snappedf(1.50×1.09, 0.01)=1.64; pre-cap P_mult=1.386 clamped to 1.31; raw=floori(83×1.64×1.31)=178. DAMAGE_CEILING silent on primary path; fires only under EC-DC-9 synthetic dual-passive bypass."
