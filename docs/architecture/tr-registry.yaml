  - id: TR-hp-status-012
    system: hp-status
    gdd: design/gdd/hp-status.md
    adr: docs/architecture/ADR-0010-hp-status.md
    requirement: "§12 27 BalanceConstants entries — story-level same-patch obligation: all 27 tuning knobs from GDD §Tuning Knobs read via `BalanceConstants.get_const(key) -> Variant` per ADR-0006 5-precedent JSON pattern (mirrors ADR-0007 §Migration §4 + ADR-0009 §Migration §From provisional precedents). Keys: MIN_DAMAGE / SHIELD_WALL_FLAT / HEAL_BASE / HEAL_HP_RATIO / HEAL_PER_USE_CAP / EXHAUSTED_HEAL_MULT / DOT_HP_RATIO / DOT_FLAT / DOT_MIN / DOT_MAX_PER_TURN / DEMORALIZED_ATK_REDUCTION / DEMORALIZED_RADIUS / DEMORALIZED_TURN_CAP / DEMORALIZED_RECOVERY_RADIUS / DEMORALIZED_DEFAULT_DURATION / DEFEND_STANCE_REDUCTION / DEFEND_STANCE_ATK_PENALTY / INSPIRED_ATK_BONUS / INSPIRED_DURATION / EXHAUSTED_MOVE_REDUCTION / EXHAUSTED_DEFAULT_DURATION / MODIFIER_FLOOR / MODIFIER_CEILING / MAX_STATUS_EFFECTS_PER_UNIT / ATK_CAP / DEF_CAP / POISON_DEFAULT_DURATION. First HPStatusController story appends 27 keys to `assets/data/balance/balance_entities.json` with provenance comments; CI lint `tools/ci/lint_balance_entities_hp_status.sh` validates presence + safe-range per GDD §Tuning Knobs. ATK_CAP / DEF_CAP consumed by Damage Calc (ownership transferred from ADR-0012 line 297-299); DEFEND_STANCE_ATK_PENALTY=-40 documented as **provisional INERT** per grid-battle v5.0 CR-13 rule 4 (DEFEND_STANCE units do not counter — penalty has no actual code path; reachability re-evaluation deferred to future mid-turn DEFEND skill design)."
    created: 2026-04-30
    revised: ""
    status: active

