    gdd: design/gdd/hp-status.md
    adr: docs/architecture/ADR-0010-hp-status.md
    requirement: "§13 + Validation §5 DI test seam — `_apply_turn_start_tick(unit_id: int)` direct call bypasses GameBus.unit_turn_started subscription for test isolation (production: called via signal subscription; tests: called directly to avoid signal infrastructure entanglement); `_map_grid` constructor-injected via Battle Preparation in production OR `MapGridStub.new()` in tests (DI seam pattern mirrors ADR-0005 `_handle_event` + ADR-0012 ResolveModifiers.rng — 4-precedent stable). `before_test()` G-15 reset obligations: `BalanceConstants._cache_loaded = false` per ADR-0006 §6 G-15 mirror; fresh `HPStatusController.new()` instance per test (no static state — forbidden_pattern `hp_status_static_var_state_addition`); `_map_grid = MapGridStub.new()` injection. Test isolation invariant: per-test fresh HPStatusController + empty `_state_by_unit` Dictionary; no leakage across test cases. Static-lint check: `grep -c '^static var' src/core/hp_status_controller.gd` returns 0 (R-4 mitigation)."
