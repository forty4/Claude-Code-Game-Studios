    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    requirement: "Elevation values 0/1/2 supported per tile. LoS uses integer Bresenham rasterization + rule: intermediate tile blocks LoS iff elevation > max(from.elev, to.elev). Destroyed walls no longer block LoS; endpoints never self-block."
    created: 2026-04-20
    revised: ""
    status: active

  - id: TR-map-grid-009
    system: map-grid
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
