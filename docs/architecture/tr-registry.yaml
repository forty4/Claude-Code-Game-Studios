    system: hp-status
    gdd: design/gdd/hp-status.md
    adr: docs/architecture/ADR-0010-hp-status.md
    requirement: "R-5 + Validation §12 Consumer mutation forbidden_pattern — `get_status_effects(unit_id)` returns shallow Array copy; the StatusEffect Resources INSIDE are shared references. Consumer mutating `effect.remaining_turns` would corrupt HPStatusController's authoritative state. Mitigation: forbidden_pattern `hp_status_consumer_mutation` (mirrors ADR-0007 hero_data_consumer_mutation precedent); `tests/unit/core/hp_status_consumer_mutation_test.gd` documents that mutating returned Array[StatusEffect] IS visible cross-call (proving convention is sole defense). Test serves as DOCUMENTED FAIL-STATE regression test, NOT a passing protective test. Source comment on `get_status_effects` reinforces 'DO NOT MUTATE'."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hp-status-016
    system: hp-status
    gdd: design/gdd/hp-status.md
    adr: docs/architecture/ADR-0010-hp-status.md
    requirement: "§Performance + Validation §8 — apply_damage <0.05ms minimum-spec mobile (Adreno 610 / Mali-G57 class): 1 Dictionary lookup O(1) + 1 PASSIVE_TAG_BY_CLASS const Dictionary read + max 3 status_effects iteration per CR-5e cap + integer arithmetic. get_modified_stat <0.05ms: 1 Dictionary lookup + 1 UnitRole accessor + max 3 status_effects iteration + 1 clamp + 1 floor. apply_status <0.10ms: slightly higher due to template `load()` + `.duplicate()`. `_apply_turn_start_tick` <0.20ms (max 3 status_effects × DoT/decrement). Memory: `_state_by_unit` Dictionary bounded by ~16-24 units × ~120-byte UnitHPState = ~3KB; StatusEffect instances ~80 bytes × max 3 per unit × 24 units = ~6KB max; status effect template `.tres` files 5 × ~500 bytes = ~2.5KB shared (loaded once, .duplicate()'d per apply); TOTAL HPStatusController heap footprint <10KB << 512MB mobile ceiling. Headless CI throughput baseline mandatory; on-device measurement deferred per damage-calc story-010 Polish-deferral pattern (stable at 6+ invocations as of ADR-0007)."
    created: 2026-04-30
    revised: ""
    status: active

