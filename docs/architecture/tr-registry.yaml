    created: 2026-04-20
    revised: ""
    status: active

  - id: TR-map-grid-010
    system: map-grid
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    requirement: "TileData must remain inline inside MapResource.tres with no external UID references. Resource.duplicate_deep() returns shared instances for UID-referenced sub-resources, which would leak destruction state between maps. Shared-preset refactor requires superseding ADR (R-3 hard constraint)."
