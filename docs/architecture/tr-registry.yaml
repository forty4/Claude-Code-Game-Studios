    created: 2026-04-20
    revised: ""
    status: active

  - id: TR-map-grid-006
    system: map-grid
    gdd: design/gdd/map-grid.md
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    requirement: "AC-PERF-2: get_movement_range() completes in <16ms on 40×30 map with move_range=10 on mid-range Android target. Achieved via packed-cache hot-path layer + early termination Dijkstra + typed locals throughout inner loop. Verification benchmark required pre-implementation."
    created: 2026-04-20
    revised: ""
    status: active

  - id: TR-map-grid-007
