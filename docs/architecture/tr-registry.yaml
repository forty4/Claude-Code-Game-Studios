    requirement: "AC-DC-49 + AC-DC-50 + Verify-against-engine: Two engine-contract pin tests mandatory on every push (headless CI) and every cross-platform matrix run. AC-DC-49: randi_range(from, to) inclusive on both ends — pattern `for i in 1000: assert(rng.randi_range(1, 1) == 1); assert(rng.randi_range(1, 100) ∈ [1, 100])`. AC-DC-50: snappedf(0.005, 0.01) == 0.01 AND snappedf(-0.005, 0.01) == -0.01 (round-half-away-from-zero). Cross-platform divergence on AC-DC-50 boundary residue is critical-tier WARN per AC-DC-37 softened-determinism contract."
