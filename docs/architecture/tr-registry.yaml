    requirement: "ADR-specific: Lazy on-first-call loading + `_cache_loaded: bool` idempotent guard. **COVERED via ADR-0006 §Decision 6 + shipped `src/feature/balance/balance_constants.gd`**. `_load_cache()` invoked on first `get_const()` call; cache persists for GDScript engine session; no eager-load at boot, no `_ready()` autoload trigger, no explicit init phase. Idempotent guard short-circuits subsequent calls even if first load failed (graceful degradation: missing file → empty `_cache` → all subsequent `get_const(key)` calls return null + push_error)."
