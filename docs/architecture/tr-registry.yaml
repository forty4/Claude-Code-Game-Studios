    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    requirement: "MapGrid is a battle-scoped Node (not Node2D, not autoload). Freed with BattleScene on return to overworld; zero cross-battle state leak. Aligns with ADR-0002 IDLE → LOADING_BATTLE → IN_BATTLE → free lifecycle."
