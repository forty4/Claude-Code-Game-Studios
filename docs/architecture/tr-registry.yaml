    revised: ""
    status: active

  - id: TR-unit-role-005
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§4 + §Engine Compatibility verification 1: Global caps via BalanceConstants.get_const(key) per ADR-0006. 10 constants consumed: ATK_CAP=200, DEF_CAP=100, HP_CAP=300, HP_SCALE=2.0, HP_FLOOR=50, INIT_CAP=200, INIT_SCALE=2.0, MOVE_RANGE_MIN=2, MOVE_RANGE_MAX=6, MOVE_BUDGET_PER_RANGE=10. UnitRole MUST use BalanceConstants accessor — zero direct reads of balance_entities.json. G-15 test isolation obligation: every UnitRole test suite calling any method that transitively reads BalanceConstants MUST reset _cache_loaded = false in before_test() per ADR-0006 §6 + .claude/rules/godot-4x-gotchas.md G-15. Static-lint check: grep -L '_cache_loaded = false' tests/unit/foundation/unit_role*.gd returns empty."
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-006
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§5 Cost-matrix unit-class dimension ratification: 6×6 cost matrix per CR-4. get_class_cost_table(unit_class: UnitRole.UnitClass) -> PackedFloat32Array returns 6-entry packed array indexed by terrain_type enum (0..5: ROAD, PLAINS, HILLS, FOREST, MOUNTAIN, BRIDGE). Values lifted verbatim from unit-role.md §CR-4. RIVER/FORTRESS_WALL impassable handled at Map/Grid layer per CR-4a (is_passable_base = false BEFORE cost-table lookup). Hot path: Map/Grid Dijkstra calls one fetch per get_movement_range invocation, then index-reads in inner loop. Ratifies ADR-0008's cost-matrix unit-class dimension placeholder per ADR-0008 §Context item 5 deferral."
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-007
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§6 Class direction multiplier ratification: 6×3 CLASS_DIRECTION_MULT table per CR-6a + EC-7 + entities.yaml. Cavalry REAR=1.09 (rev 2.8 Rally-ceiling-fix value, was 1.20). 6 classes × 3 directions (FRONT=0, FLANK=1, REAR=2). STRATEGIST and COMMANDER rows are all-1.0 no-ops by design (class identity expressed elsewhere — Tactical Read evasion bypass + Rally adjacency aura). get_class_direction_mult(unit_class, direction) reads from assets/data/config/unit_roles.json (per-class data locality), NOT BalanceConstants. The entities.yaml CLASS_DIRECTION_MULT registration is design-side cross-system tracking only — explicit asymmetry documented in ADR-0009 §6 prose. Damage Calc reads via UnitRole's accessor, not via BalanceConstants. Future amendment requires /propagate-design-change against unit-role.md + damage-calc.md + entities.yaml + unit_roles.json + this ADR §6."
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-008
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§5 R-1 mitigation: PackedFloat32Array per-call copy semantics. Godot 4.x COW (copy-on-write) handles per-call copy naturally for PackedFloat32Array returned from a static method. UnitRole MUST NOT cache and return a shared backing array — GDScript has no const reference enforcement, and a caller mutating a cached array would silently corrupt subsequent calls. Codified as forbidden_pattern unit_role_returned_array_mutation in docs/registry/architecture.yaml. Mandatory unit test tests/unit/foundation/unit_role_test.gd::test_get_class_cost_table_caller_mutation_isolated: fetch table, mutate returned array, fetch again, assert original values returned. Source-comment in unit_role.gd above the method: '# RETURNS PER-CALL COPY — DO NOT cache and return shared array.'"
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-009
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "§7 Passive tag canonicalization: 6 StringName tags locked as canonical passive set — &\"passive_charge\" (CAVALRY), &\"passive_shield_wall\" (INFANTRY), &\"passive_high_ground_shot\" (ARCHER), &\"passive_tactical_read\" (STRATEGIST), &\"passive_rally\" (COMMANDER), &\"passive_ambush\" (SCOUT). Exposed via const PASSIVE_TAG_BY_CLASS: Dictionary keyed by UnitClass enum int. Array[StringName] is the mandatory typed-array form for any consumer assembling passive-tag sets per ADR-0012 forbidden_pattern damage_calc_dictionary_payload (Array[String] is silent-wrong-answer hole — see ADR-0012 EC-DC-25 / AC-DC-51). Adding a 7th passive requires ADR-0009 amendment + propagate-design-change against unit-role.md (CR-2) + damage-calc.md + AI ADR."
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-010
    system: unit-role
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "Non-emitter invariant per ADR-0001 line 375 (UnitRole on non-emitter list as 'pure data/calculation layers... no state events'). Zero signal declarations + zero connect()/emit_signal() calls in src/foundation/unit_role.gd. Codified as forbidden_pattern unit_role_signal_emission in docs/registry/architecture.yaml. Static-lint enforcement per §Validation Criteria §4: grep -E '(signal\\s|connect\\(|emit_signal\\()' src/foundation/unit_role.gd returns zero matches. Mirrors ADR-0012 forbidden_pattern damage_calc_signal_emission precedent."
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-011
    system: unit-role
    gdd: design/gdd/unit-role.md
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "F-1..F-5 stat derivation formulas with explicit clamp ranges per CR-1b + GDD §Formulas: F-1 atk in [1, ATK_CAP=200]; F-2 phys_def + mag_def in [1, DEF_CAP=100]; F-3 max_hp in [HP_FLOOR+1=51, HP_CAP=300] (EC-14 minimum 51 not 50); F-4 initiative in [1, INIT_CAP=200]; F-5 effective_move_range in [MOVE_RANGE_MIN=2, MOVE_RANGE_MAX=6]. 100% test coverage required per technical-preferences.md 'balance formulas 100%'. EC-1 Strategist move_range floor + EC-2 Cavalry cap absorption + EC-13 phys_def reaching DEF_CAP + EC-14 HP_FLOOR+1 minimum are mandatory test scenarios."
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-unit-role-012
    system: unit-role
    adr: docs/architecture/ADR-0009-unit-role.md
    requirement: "Performance budgets: each derived-stat method (get_atk, get_phys_def, get_mag_def, get_max_hp, get_initiative) <0.05ms; get_class_cost_table <0.01ms per call (single PackedFloat32Array per-call copy from cached row); get_class_direction_mult <0.01ms per call (single bracket index into cached 6×3 table); per-battle init derivation pass <0.6ms total (60 calls × 0.05ms one-time at battle init, well inside 16.6ms one-time budget). Memory <2KB for cached unit_roles.json parse + transient PackedFloat32Array copies (~24 bytes each, GC-collected per call). Headless CI throughput baseline test in tests/unit/foundation/unit_role_perf_test.gd; on-device measurement deferred per damage-calc story-010 Polish-deferral pattern (now stable at 5+ invocations)."
    created: 2026-04-28
    revised: ""
    status: active

  - id: TR-hero-database-001
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "§1 Module form — `class_name HeroDatabase extends RefCounted` + `@abstract` decoration (G-22 typed-reference parse-time block; reflective bypass non-issue) + all-static methods + `static var _heroes_loaded: bool` + `static var _heroes: Dictionary[StringName, HeroData] = {}` (Godot 4.4+ typed Dictionary syntax). Zero `_init`, zero `_ready`, zero `_process`, zero instance fields, zero signals, zero subscriptions. Source location: src/foundation/hero_database.gd. 5th-precedent stateless-static utility class pattern (ADR-0008 → 0006 → 0012 → 0009 → 0007); pattern is now load-bearing project discipline for Foundation/Core data-layer ADRs. Future Foundation/Core data-layer ADRs (Skill, Formation, Equipment, Character Growth) inherit this pattern unless a domain-specific reason justifies divergence."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-002
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "§2 HeroData Resource shape ratification: `class_name HeroData extends Resource` with 26 @export fields per CR-2's 9 record blocks — Identity (7: hero_id StringName + name_ko/zh/courtesy + faction int + portrait_id + battle_sprite_id), Core Stats (4: stat_might/intellect/command/agility int [1,100]), Derived Seeds (2: base_hp_seed/base_initiative_seed int [1,100]), Movement (1: move_range int [2,6]), Role (2: default_class int + equipment_slot_override Array[int]), Growth (4: growth_might/intellect/command/agility float [0.5,2.0]), Skills (2 parallel arrays: innate_skill_ids Array[StringName] + skill_unlock_levels Array[int]), Scenario (3: join_chapter int + join_condition_tag String + is_available_mvp bool), Relationships (1: relationships Array[Dictionary] provisional). Plus 1 nested HeroFaction enum (SHU=0, WEI=1, WU=2, QUNXIONG=3, NEUTRAL=4) — locally scoped; no cross-system enum import. All-@export discipline mandatory per ADR-0003 TR-save-load-002 + Inspector authoring round-trip + ResourceSaver serialization compatibility. `Resource` base-class overhead (resource_path, resource_name, ResourceLoader cache participation) accepted at ~5KB/record × 100 cache size, negligible against 512MB mobile ceiling (godot-specialist Item 8 acknowledgement, 2026-04-30). Asymmetry with ADR-0012's RefCounted typed wrappers intentional: HeroData is content data with Inspector + ResourceSaver use cases; ADR-0012 wrappers are transient per-call computation contexts. Field deferrals to downstream ADRs: relationships → Formation Bonus typed Resource migration; equipment_slot_override int → Equipment ADR enum mapping; join_condition_tag String → Scenario Progression tag vocabulary canonicalization. The 7 UnitRole-read fields (stat_might/intellect/command/agility + base_hp_seed/base_initiative_seed + move_range) preserved verbatim from provisional shape; ADR-0009 call sites parameter-stable."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-003
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "§3 Storage form ratification: single JSON file at `assets/data/heroes/heroes.json` (Dictionary keyed by hero_id String at top level; per-hero record literals as values). Lazy-loaded via instance-form `JSON.new().parse()` (line/col diagnostics on parse error per ADR-0009 §4 precedent). Each top-level Dictionary entry converted into HeroData Resource instance via field-by-field assignment + per-field range validation. Cache (Dictionary[StringName, HeroData]) persists for the GDScript engine session. Mirrors ADR-0006 balance_entities.json + ADR-0008 terrain_config.json + ADR-0009 unit_roles.json 4-precedent JSON storage pattern. Rejected Alternatives: per-hero .tres (file management overhead + PR-diff difficulty), hand-coded const class (violates data-driven GDD requirement per AC-DC-48 / AC-20 / CR-10 precedent), full DataRegistry pipeline now (over-building; ADR-0006 already deferred to Alpha). Future Alpha (30+ heroes) MAY split into faction-scoped files (heroes_shu.json etc.) for diff-locality; not a forward-compat constraint for MVP. `FileAccess.get_file_as_string()` read path is unaffected by Godot 4.4 store_* bool return change."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-004
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "§4 Public API — 6 static query methods, 1:1 mapping to GDD §Interactions 'Hero DB가 외부에 노출하는 쿼리 인터페이스' table: `get_hero(hero_id: StringName) -> HeroData` (single Resource SHARED reference; null + push_error on miss treated as blocker bug NOT degrade-with-default), `get_heroes_by_faction(faction: int) -> Array[HeroData]` (per-call typed array; HeroData elements shared), `get_heroes_by_class(unit_class: int) -> Array[HeroData]` (int = UnitRole.UnitClass value [0,5]), `get_all_hero_ids() -> Array[StringName]` (per-call typed array), `get_mvp_roster() -> Array[HeroData]` (filter is_available_mvp == true), `get_relationships(hero_id: StringName) -> Array[Dictionary]` (provisional Dict shape until Formation Bonus ADR). MVP linear-scan filters for get_heroes_by_faction/get_heroes_by_class (10-hero × 5 field reads = trivial); pre-built per-faction/per-class indices deferred to Alpha when 30+ heroes ship (call-shape stable). Typed-array construction pattern (G-2 prevention) MANDATORY: `var result: Array[HeroData] = []` + `result.append(hero)` + `return result` — NOT `_heroes.values().duplicate()` which silently demotes typing per G-2."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-005
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "Read-only contract per GDD §Interactions '읽기 전용 계약' + Cross-system contract 'base + modifier' pattern. Consumers of HeroDatabase.get_hero(...) MUST NOT mutate any field of the returned HeroData Resource. Runtime stat changes (level-up, equipment, status effects) belong to consumer-side base+modifier pattern — Hero DB stores only the immutable base. A consumer mutating `hero.stat_might = 99` corrupts the shared cache for subsequent consumers — silent correctness bug. Codified as forbidden_pattern hero_data_consumer_mutation in docs/registry/architecture.yaml. Source-comment in hero_database.gd above each query method: `# RETURNS SHARED REFERENCE — consumers MUST NOT mutate fields. Use base+modifier pattern.` Mandatory R-1 mitigation test: tests/unit/foundation/hero_database_consumer_mutation_test.gd documents shared-reference contract (test asserts mutation IS visible across get_hero calls — proving the convention is the only defense; GDScript has no const reference enforcement). Alternative deeper-defense `duplicate_deep()` on every get_hero rejected for performance (10× cost on hot path). hero_id string reference contract (per CR §Interactions): all systems reference heroes by hero_id string; object reference forbidden — Godot Resource cyclic-load-dependency prevention."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-006
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "CR-1 Hero ID format + AC-01: hero_id format `^[a-z]+_\\d{3}_[a-z_]+$` (faction_seq_slug; e.g., shu_001_liu_bei, wei_001_cao_cao, wu_003_zhou_yu, qun_001_lu_bu). 3-digit zero-padded sequence. ID is immutable across project lifetime — faction changes (e.g., Lu Bu's independence → Cao Cao → Liu Bei) keep original hero_id; runtime faction tracked separately via faction field. Runtime FATAL severity check in `_load_heroes()` rejects entire load on first violation (matches GDD AC-01 + EC-1 strict). `push_error` lists offending hero_id + offending pattern position. Pattern matched at load-time; not re-validated at query time (immutable post-load)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-007
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "CR-2 Schema range checks (AC-02 + AC-03 + AC-04 + AC-05): per-field range validation on every record at load-time. Stats (stat_might/intellect/command/agility) ∈ [1, 100] inclusive — boundary values 1 and 100 ACCEPTED, 0 and 101 REJECTED. Derived seeds (base_hp_seed, base_initiative_seed) ∈ [1, 100] inclusive. move_range ∈ [2, 6] inclusive — boundary values 2 and 6 ACCEPTED, 1 and 7 REJECTED. Growth rates (growth_might/intellect/command/agility) ∈ [0.5, 2.0] inclusive — boundary values 0.5 and 2.0 ACCEPTED, 0.4 and 2.1 REJECTED. Runtime FATAL severity per-record rejection — offending record dropped + push_error lists hero_id + offending field name + offending value + expected range; other records continue loading. Validation is pre-cache: a rejected record is NEVER inserted into _heroes Dictionary."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-008
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "EC-1 Duplicate hero_id detection + AC-12: two records sharing the same hero_id reject the entire database load (FATAL severity, full-load reject — not per-record). `push_error` lists the duplicated hero_id explicitly. Silent overwrite forbidden — runtime-non-reproducible bug source. Detection via Dictionary key collision check during load: if `_heroes.has(hero_id)` returns true at insert time, reject the entire batch and clear `_heroes` (no partial state on FATAL). Distinct from EC-2 per-record FATAL (skill array mismatch only rejects offending record). _heroes_loaded remains false on FATAL load-reject; subsequent caller sees empty Dictionary + the push_error trail in debugger console."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-009
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "EC-2 + EC-3 Skill parallel-array integrity + AC-07 + AC-13: `innate_skill_ids: Array[StringName]` and `skill_unlock_levels: Array[int]` MUST be equal length. Per-record FATAL severity: if `innate_skill_ids.size() != skill_unlock_levels.size()`, reject offending record only (other records continue) + push_error lists hero_id + both array sizes + offending field names. Both length 0 ACCEPTED — heroes without innate skills are valid (EC-3). Padding/truncation forbidden — always authoring error. MVP cap: max 3 innate skills per hero (CR-2 Skills Block table); enforcement via balance lint script Polish-tier follow-up."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-010
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "EC-4 + EC-5 + EC-6 Relationship WARNING tier (AC-14): runtime non-fatal validation. EC-4 self-referencing relationship (hero_b_id == hero_id): drop offending relationship entry + push_warning. EC-5 orphan hero_b_id (FK target missing from _heroes): drop offending relationship entry + push_warning listing unresolved hero_b_id. MVP roster excluding Full-Vision heroes is an expected state per GDD EC-5 — FK miss is non-fatal by design. EC-6 asymmetric relationship conflict (A→B is RIVAL is_symmetric=true, B→A is SWORN_BROTHER is_symmetric=true): load BOTH relationships independently + push_warning (design-warning, not data-error) — Hero DB does NOT adjudicate; Formation Bonus ADR / Battle system owns conflict resolution. Hero record itself loads normally on any of EC-4/5/6 — only specific relationship entries are dropped or flagged."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-011
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "F-1..F-4 Stat balance validation formulas — DEFERRED to Polish-tier build-time tooling (AC-08 + AC-09 + AC-10 + AC-11). F-1 stat_total ∈ [STAT_TOTAL_MIN=180, STAT_TOTAL_MAX=280] (boundary 180/280 valid, 281+ High-Risk flag). F-2 SPI = (stat_max - stat_min) / stat_avg < SPI_WARNING_THRESHOLD=0.5 design warning. F-3 stat_projected(L) = stat_base + floor(stat_base × growth_rate × (L / L_cap)) clamped to STAT_HARD_CAP=100; growth_ceiling check. F-4 MVP stat_total ∈ [190, 260] + role_coverage_check (4 distinct dominant_stat per MVP roster). Implementation: tools/ci/lint_hero_database_validation.sh (mirrors AC-DC-48 hardcoded-constants lint precedent). Validation thresholds via BalanceConstants.get_const(key) per ADR-0006 — STAT_TOTAL_MIN, STAT_TOTAL_MAX, SPI_WARNING_THRESHOLD, STAT_HARD_CAP, MVP_FLOOR_OFFSET=10, MVP_CEILING_OFFSET=20 thresholds appended to balance_entities.json same-patch with the lint story (NOT this ADR — ADR-0007's runtime pipeline does NOT consume validation thresholds; the BalanceConstants dependency is forward-compat only). Rationale (N2): out-of-range hero authored in heroes.json is designer authoring error, not runtime correctness issue — appropriately tooled at build-time where iteration loop closes faster than runtime push_error in editor console. Polish-deferral pattern stable at 5+ invocations (ADR-0008 + ADR-0006 + ADR-0009 + ADR-0012 + ADR-0007)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-012
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "CR-4 default_class cross-doc convention (Item 3 corrected wording 2026-04-30): HeroData.default_class stored as `int` (NOT typed `@export var default_class: UnitRole.UnitClass`). Cross-script @export typed-enum reference creates hard load-order coupling between hero_data.gd and unit_role.gd that is brittle in Godot 4.x — risk is INSPECTOR-AUTHORING INSTABILITY: when hero_data.gd loads before unit_role.gd resolves its class_name, the cross-script enum type cannot resolve and the editor may show a bare integer field instead of an enum dropdown (NOTE: storage IS always int at binary level regardless of @export type hint resolution; risk is editor-time UX, not data corruption). Storage as int matches entities.yaml CLASS_DIRECTION_MULT key form (0..5 ints). UnitRole call sites bind unit_class: UnitRole.UnitClass at parameter level per ADR-0009 §3 — type safety preserved at boundary. Cross-doc convention: HeroData.default_class int values align 1:1 with UnitRole.UnitClass enum int values (CAVALRY=0, INFANTRY=1, ARCHER=2, STRATEGIST=3, COMMANDER=4, SCOUT=5). NOT registered as forbidden_pattern (value-alignment convention, not architectural anti-pattern). Drift surfaces as test failures in UnitRole's get_class_direction_mult test suite if values diverge."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-013
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "Non-emitter invariant per ADR-0001 line 372 (Hero Database (#25) on non-emitter list as 'read-only data registry'). Zero signal declarations + zero connect()/emit_signal() calls in src/foundation/hero_database.gd + src/foundation/hero_data.gd. Codified as forbidden_pattern hero_database_signal_emission in docs/registry/architecture.yaml. Mirrors ADR-0012 forbidden_pattern damage_calc_signal_emission + ADR-0009 forbidden_pattern unit_role_signal_emission + ADR-0006 forbidden_pattern balance_constants_signal_emission precedents (4-precedent stateless-non-emitter discipline). Static-lint enforcement per §Validation Criteria §6: `grep -E '(signal\\s|connect\\(|emit_signal\\()' src/foundation/hero_database.gd src/foundation/hero_data.gd` returns zero matches. ADR-0001 line 372 prose API name (hero_database.get(unit_id)) is stale relative to ADR-0007 §4 6-method API (HeroDatabase.get_hero(hero_id: StringName) etc.) — non-blocking advisory; defer to next ADR-0001 amendment. Hero DB belongs to non-emitter discipline regardless of API form."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-014
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "§1 Lazy-init lifecycle + G-15 test isolation (R-2 mitigation): first call to ANY HeroDatabase static method triggers `_load_heroes()` (FileAccess + JSON.new().parse + per-record HeroData instantiation + range validation). Subsequent calls are O(1) Dictionary[StringName, HeroData] lookups. Cache (`_heroes`) persists for GDScript engine session; survives BattleScene tear-down/instantiation (cross-scene consumer pattern: Battle Preparation reads heroes pre-battle; Scenario Progression reads heroes pre-load). Test isolation obligation: every GdUnit4 test suite that calls ANY HeroDatabase method MUST reset `HeroDatabase._heroes_loaded = false` in `before_test()` per G-15 + ADR-0006 §6 obligation. Pattern proven stable at 3-precedent (ADR-0006 _cache_loaded, ADR-0009 _coefficients_loaded, ADR-0007 _heroes_loaded). Static-lint check: `grep -L '_heroes_loaded = false' tests/unit/foundation/hero_database*.gd` returns empty. GdUnit4 v6.1.2 lifecycle hook is `before_test()` (NOT `before_each()`); this is the project-pinned GdUnit4 idiom."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-hero-database-015
    system: hero-database
    gdd: design/gdd/hero-database.md
    adr: docs/architecture/ADR-0007-hero-database.md
    requirement: "Performance budgets (AC-15 + §Performance Implications): `get_hero(id)` < 0.001ms (Dictionary[StringName, HeroData] hash lookup, O(1)). `get_heroes_by_faction` / `get_heroes_by_class` < 0.05ms for 10-hero MVP (linear scan over _heroes values × ~5 field reads); pre-built per-faction/per-class indices deferred to Alpha when 30+ heroes ship — call-shape stable, internal optimization only. `get_mvp_roster` < 0.01ms for 8-10-hero filter on is_available_mvp == true. `get_relationships` per-hero array variable size; typical < 10 entries, lookup + array copy < 0.01ms. `get_all_hero_ids` Dictionary.keys() copy via Godot 4.x typed-array COW < 0.01ms for 10-hero MVP. `_load_heroes()` one-time cost: FileAccess + JSON.parse + per-record HeroData instantiation + range validation ≈ 5-15ms for 10-hero MVP, target < 100ms for 100-hero Alpha per AC-15. Memory: ~5KB per HeroData Resource (26 fields × ~200 bytes typical) × 10 = ~50KB cache for 10-hero MVP; ~500KB at 100-hero Alpha — well under 512MB mobile ceiling. AC-15 100-hero / 100ms benchmark deferred to Alpha (10-hero MVP measured; 100-hero forward-compat extrapolation). Headless CI throughput baseline test in tests/unit/foundation/hero_database_perf_test.gd; on-device measurement deferred per damage-calc story-010 Polish-deferral pattern."
    created: 2026-04-30
    revised: ""
    status: active

  # ═══ TR-turn-order-002..022 — registered 2026-04-30 via /architecture-review delta #8 (ADR-0011 Proposed → Accepted) ═══

  - id: TR-turn-order-002
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision Module form — TurnOrderRunner is a battle-scoped Node child of BattleScene (`class_name TurnOrderRunner extends Node`), created on battle-init via Battle Preparation, freed automatically with BattleScene per ADR-0002 SceneManager pattern. 5-precedent stateless-static utility class form (ADR-0008→0006→0012→0009→0007) EXPLICITLY REJECTED as Alternative 2 — engine-level structural incompatibility per ADR-0005 §Alt 4 + ADR-0010 §Alt 3 pattern boundary: Turn Order LISTENS to GameBus.unit_died AND holds mutable per-unit + queue + round state. Pattern boundary now formally codified at 3 ADRs (ADR-0005 InputRouter Autoload Node + ADR-0010 HPStatusController battle-scoped Node + ADR-0011 TurnOrderRunner battle-scoped Node) — Foundation/Core Node-based form for state-holders + signal-listeners is now project discipline. Stateless-static remains canonical for systems CALLED. Autoload form (ADR-0005 InputRouter pattern) REJECTED as Alternative 1 — battle-scoped form provides cleaner CR-1b non-persistence enforcement (state freed automatically when BattleScene is freed; no manual reset between battles needed). Hybrid static-query + Node-state form REJECTED as Alternative 3 — bifurcation creates two failure modes (stale static cache + Node not yet ready). Per-unit Resource form REJECTED as Alternative 4 — UnitTurnState data is BATTLE-SCOPED RUNTIME state with no design-time content; Resource is misuse."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-003
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision State Ownership — TurnOrderRunner owns 5 instance fields: `_queue: Array[int]` (ordered ALIVE unit_ids for current round, rebuilt at R3 via in-place mutation `.clear() + .append_array()` per turn_order_typed_array_reassignment forbidden_pattern); `_queue_index: int` (pointer to currently ACTING unit, advances at T7); `_round_number: int` (initialized to 0 at BI-4, incremented at R1); `_unit_states: Dictionary[int, UnitTurnState]` keyed by unit_id matching ADR-0001 unit_died(int) signal payload type + ADR-0010 UnitHPState Dictionary[int, UnitHPState] key consistency lock; `_round_state: RoundState` typed enum (BATTLE_NOT_STARTED, BATTLE_INITIALIZING, ROUND_STARTING, ROUND_ACTIVE, ROUND_ENDING, BATTLE_ENDED). State NEVER survives scene transitions — fresh `TurnOrderRunner.new()` per battle automatically zeroes all instance fields. CR-1b non-persistence enforced by lifecycle alignment per ADR-0002 SceneManager battle teardown."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-004
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision RefCounted typed wrappers — 3 RefCounted classes for per-unit + snapshot data: (1) `class_name UnitTurnState extends RefCounted` with 6 fields (unit_id: int, move_token_spent: bool, action_token_spent: bool, accumulated_move_cost: int [reset to 0 at T4 per F-2], acted_this_turn: bool [CR-3f true iff at least one token spent during T5], turn_state: TurnOrderRunner.TurnState enum {IDLE, ACTING, DONE, DEAD}); (2) `class_name TurnOrderSnapshot extends RefCounted` with 2 fields (round_number: int, queue: Array[TurnOrderEntry]) — pull-based snapshot per Contract 3, pure value semantics; (3) `class_name TurnOrderEntry extends RefCounted` with 5 fields (unit_id: int, is_player_controlled: bool, initiative: int, acted_this_turn: bool, turn_state: int). RefCounted (NOT Resource) chosen because: battle-scoped non-serialized per CR-1b; no @export inspector visibility required; lighter-weight than Resource per ADR-0007 Item 8; matches ADR-0010 UnitHPState + ADR-0012 4-RefCounted-wrapper precedent. UnitTurnState.snapshot() returns NEW UnitTurnState via explicit field-by-field copy (NOT duplicate()/duplicate_deep() — those are Resource methods; godot-specialist 2026-04-30 Item 3 RefCounted idiomatic pattern)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-005
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision Public mutator API — 3 mutator methods: (1) `initialize_battle(unit_roster: Array[BattleUnit]) -> void` called once by Battle Preparation at battle-init, executes BI-1 through BI-5 sequence (collect units, compute initiative via UnitRole.get_initiative per ADR-0009, initialize per-unit flags, initialize counters, apply battle-start effects); BI-6 transitions _round_state to ROUND_STARTING + triggers _begin_round() asynchronously via Callable method-reference deferred form per godot-specialist 2026-04-30 Item 6 (`_begin_round.call_deferred()`, NOT string-based `call_deferred(\"_begin_round\")`); subscribes to GameBus.unit_died on first call only (idempotent connect; G-15 test isolation reset must disconnect). (2) `declare_action(unit_id: int, action: ActionType, target: ActionTarget) -> ActionResult` called by player input layer (via Grid Battle BattleController) OR AI System (via request_action delegation at T4); validates token availability + DEFEND_STANCE locks + range/cooldown gates per CR-3 + CR-4. (3) `_advance_turn(unit_id: int) -> void` TEST SEAM — direct invocation of T1–T7 sequence; production-called via internal queue advancement; tests-called directly to bypass GameBus signal infrastructure; 4-precedent extension of DI seam pattern (ADR-0005 _handle_event + ADR-0010 _apply_turn_start_tick + ADR-0012 _resolve_with_rng + ADR-0011 _advance_turn). GDScript 4.x does NOT enforce leading-underscore as private; convention only; GdUnit4 v6.1.2 calls _advance_turn directly with no reflection workaround."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-006
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision Public read-only query API — 5 query methods: (1) `get_acted_this_turn(unit_id: int) -> bool` — Damage Calc consumes per attack for Scout Ambush gate per ADR-0012 line 343 (type narrowed StringName → int via delta #8 same-patch); returns _unit_states[unit_id].acted_this_turn; returns false for unknown unit_id (R-2 defensive `_unit_states.has()` check). (2) `get_current_round_number() -> int` — Damage Calc consumes per attack for Scout Ambush round-2+ gate; returns _round_number; returns 0 before BI-4/R1 (battle not started). (3) `get_turn_order_snapshot() -> TurnOrderSnapshot` — Battle HUD + AI consume for queue display + target prioritization; returns deep snapshot (TurnOrderSnapshot RefCounted typed wrapper; consumer cannot mutate _queue or _unit_states); pull-based — Battle HUD calls on round_started / unit_turn_ended / unit_died receipts. (4) `get_charge_ready(unit_id: int) -> bool` — Damage Calc consumes for Cavalry Charge passive per ADR-0009 passive_charge; returns _unit_states[unit_id].accumulated_move_cost >= BalanceConstants.get_const(\"CHARGE_THRESHOLD\"); reset to 0 at T4 per F-2. (5) `get_unit_turn_state(unit_id: int) -> UnitTurnState` — AI System consumes for action selection context; returns per-unit RefCounted typed wrapper via UnitTurnState.snapshot() defensive copy (NOT _unit_states[unit_id] directly); used at T4 for AI decision context. All 5 queries are O(1) Dictionary lookup + scalar return."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-007
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision Emitted signals — TurnOrderRunner is sole emitter of 4 GameBus signals per ADR-0001 lines 152–155 single-emitter rule: (1) `round_started(round_number: int)` emitted at R4 after queue construction, consumers Grid Battle + Formation Bonus + Battle HUD (frequency: burst per ADR-0001 §3); (2) `unit_turn_started(unit_id: int)` emitted at T4 after _activate_unit_turn, consumers HP/Status (DoT tick + duration decrement + DEFEND_STANCE/DEMORALIZED expiry per ADR-0010 §Soft/Provisional clause (1) ratified by this ADR), AI (action delegation), Battle HUD (active unit highlight); (3) `unit_turn_ended(unit_id: int, acted: bool)` emitted at T6 after _mark_acted, consumers Grid Battle + AI + Battle HUD; (4) `victory_condition_detected(result: int)` emitted at T7 (decisive outcome) OR RE2 (round cap DRAW), int enum {PLAYER_WIN=0, PLAYER_LOSE=1, DRAW=2}, sole consumer Grid Battle (transitions to RESOLUTION + emits authoritative `battle_outcome_resolved` per ADR-0001 line 301 single-owner rule). Signal #4 added 2026-04-30 via §Migration Plan §0 same-patch ADR-0001 amendment (line 155 declaration + line 301 §3 table row + line 13 Last Verified refresh)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-008
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision Consumed signal — TurnOrderRunner subscribes to `GameBus.unit_died(unit_id: int)` (HPStatusController emitter per ADR-0010); handler `_on_unit_died(unit_id)` removes unit from _queue immediately (CR-7a), removes from _unit_states, advances _queue_index appropriately. CR-7d counter-attack scenario: if dead unit is currently ACTING, interrupts T5 (no further T5 actions, T6 skipped, T7 executes with dead unit omitted). **R-1 mitigation**: subscribed with `Object.CONNECT_DEFERRED` flag per ADR-0001 §5 deferred-connect mandate (stable through Godot 4.6 per godot-specialist 2026-04-30 Item 4); defers queue removal to next idle frame after apply_damage call stack unwinds; T7 victory check still fires synchronously via unwound stack reaching original T5 caller. Code: `GameBus.unit_died.connect(_on_unit_died, Object.CONNECT_DEFERRED)`. **R-2 defensive**: `_on_unit_died` checks `_unit_states.has(unit_id)` and short-circuits no-op if absent (covers double-death edge case if both DoT and counter-attack mark same unit dead)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-009
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Decision Forbidden patterns — 5 patterns registered in docs/registry/architecture.yaml v4 → v5: (1) `turn_order_consumer_mutation` — consumers MUST NOT mutate UnitTurnState / TurnOrderSnapshot returned by query API; defensive snapshot pattern enforced. (2) `turn_order_external_queue_write` — _queue + _unit_states MUST NOT be modified outside TurnOrderRunner (no public setter; static lint asserts no .gd file outside src/core/turn_order_runner.gd assigns to TurnOrderRunner._queue or TurnOrderRunner._unit_states). (3) `turn_order_signal_emission_outside_domain` — TurnOrderRunner MUST emit ONLY 4 signals (round_started + unit_turn_started + unit_turn_ended + victory_condition_detected); MUST NOT emit any other GameBus signal per ADR-0001 single-emitter rule (mirrors ADR-0010 / ADR-0005 / ADR-0009 non-emitter discipline). (4) `turn_order_static_var_state_addition` — must not add static class-level state (use _unit_states Dictionary instead); battle-scoped lifecycle would be violated by class-level static variables persisting across battles. (5) `turn_order_typed_array_reassignment` — _queue MUST be mutated in-place (`_queue.clear() + _queue.append_array(new_list)`); MUST NOT be reassigned (`_queue = new_list`) per godot-specialist 2026-04-30 Item 8 + G-2 prevention pattern. Reassignment risks typed-array reference replacement hazards under G-15 test resets."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-010
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§F-1 + §CR-5 tie-break cascade — queue is ALIVE-units initiative-ordered with deterministic tie-breaking cascade: (1) initiative DESC (primary); (2) stat_agility DESC (secondary, read from HeroData via `HeroDatabase.get_hero(hero_id).stat_agility` per ADR-0007 — note `hero_id: StringName` distinct from `unit_id: int` identifiers; mapping handled by Battle Preparation at BI-1); (3) is_player_controlled DESC (tertiary); (4) unit_id ASC (final guarantee of total order). Same 20-unit input produces identical queue 100 times (AC-13 determinism)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-011
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§CR-2 T1–T7 sequence strict ordering — per-unit turn lifecycle executes in 7-step sequence: T1 DoT tick (HP/Status processes POISON via unit_turn_started subscription) → T2 death check (skip remaining steps if dead) → T3 status effect duration decrement (TURN_BASED effects) + DEFEND_STANCE/DEMORALIZED expiry (HP/Status) → T4 activate turn (emit `unit_turn_started`, reset move_token_spent + action_token_spent + accumulated_move_cost to FRESH/0) → T5 execute action budget (player input or AI delegation; multiple declare_action() calls until ACTION token spent or WAIT) → T6 mark acted (emit `unit_turn_ended(unit_id, acted_this_turn)`) → T7 victory check (emit `victory_condition_detected(result)` if decisive). State machine `_round_state` enum + internal `_advance_turn` driver enforces sequence."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-012
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§CR-3 action budget — per-unit budget tracked in UnitTurnState: 1 MOVE token (binary; FRESH → spent at MOVE confirmation) + 1 ACTION token (binary; FRESH → spent at ATTACK / SKILL / DEFEND declaration). Both tokens reset to FRESH at T4. CR-3f: `acted_this_turn: bool` set true iff at least one token spent during T5 (used by Damage Calc Scout Ambush gate). Token order flexible: AC-03/04/05/06 cover all 6 declare_action() permutations producing correct acted_this_turn flag at T6. No carry-over across turns. `accumulated_move_cost: int` (F-2 charge budget) reset to 0 at T4 (turn START), not T6 — even if T5 is interrupted by death, next turn's T4 cleanly resets (R-3 mitigation)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-013
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§CR-4 action types — 5 ActionType enum values: MOVE / ATTACK / USE_SKILL / DEFEND / WAIT. declare_action() validates ActionType + token availability + DEFEND_STANCE locks per CR-4c (DEFEND_STANCE applied via HP/Status SE-3 prevents subsequent ACTION-token-spending until expiry). DEFEND spends ACTION token per CR-3e. WAIT does not reposition; tokens forfeited per CR-8 — declare_action(WAIT) sets acted_this_turn = false + turn_state = DONE; no queue manipulation. Failed validation returns ActionResult{success: false, error_code: ActionError, side_effects: Array}."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-014
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§CR-6 static initiative MVP rule — initiative computed once at BI-2 via UnitRole.get_initiative(hero, unit_class) per ADR-0009 (one-time per-unit per-battle cadence); cached per-unit (NOT recomputed at R3); queue rebuilt each round from same initiative values; no dynamic re-queuing in MVP. CR-6a: queue is a snapshot, not re-sorted mid-round — DEMORALIZED ally hero arriving mid-round does NOT recover the unit until T3 of its own next-round turn. CR-6b: status effects do NOT modify initiative in MVP. AC-09 verifies mid-battle status effect application does NOT reorder queue."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-015
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§CR-7 death mid-round + CR-7d counter-attack T5 interrupt — when `unit_died(unit_id)` is received: (a) Turn Order removes the unit from _queue immediately (CR-7a); (b) removes from _unit_states; (c) advances _queue_index appropriately. CR-7d: if the dead unit is currently ACTING (counter-attack scenario), interrupts T5 — no further T5 actions, T6 skipped, T7 executes with dead unit omitted. R-1 mitigation: CONNECT_DEFERRED (TR-turn-order-008). R-2 mitigation: defensive `_unit_states.has(unit_id)` check covers double-death edge case. Queue rebuild at R3 picks up units killed AFTER R3: deaths between R3 and unit's T1 handled by T1 death check (T2 step) + _on_unit_died queue removal. AC-10 verifies _on_unit_died removes acting unit + T6 skipped + T7 fires."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-016
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§CR-9 BI-1..BI-6 battle initialization — initialize_battle() executes 6-step sequence: BI-1 collect unit roster from Battle Preparation (mapping hero_id: StringName → unit_id: int established here); BI-2 compute initiative via UnitRole.get_initiative(hero, unit_class) per ADR-0009 (one-time per-unit cadence); BI-3 initialize per-unit UnitTurnState entries (move_token_spent=false, action_token_spent=false, accumulated_move_cost=0, acted_this_turn=false, turn_state=IDLE); BI-4 initialize counters (_round_number=0, _queue_index=0, _round_state=BATTLE_INITIALIZING); BI-5 apply battle-start effects (deferred to Grid Battle / Formation Bonus per orchestrator hand-off); BI-6 transition _round_state to ROUND_STARTING + trigger _begin_round() asynchronously via `_begin_round.call_deferred()` Callable method-reference form (per godot-specialist 2026-04-30 Item 6; NOT string-based `call_deferred(\"_begin_round\")` per project deprecated-apis pattern). Static lint asserts no string-based `call_deferred(` occurrences in src/core/turn_order_runner.gd."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-017
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§F-2 charge accumulation — Cavalry Charge passive (passive_charge tag per ADR-0009 PASSIVE_TAG_BY_CLASS) accumulates move cost during T5: `accumulated_move_cost += movement_cost_consumed_during_T5`. Reset to 0 at T4 (turn START), not T6 (R-3 mitigation: turn-interrupted-by-death scenario verifies clean reset on next turn). `get_charge_ready(unit_id) -> bool` returns _unit_states[unit_id].accumulated_move_cost >= BalanceConstants.get_const(\"CHARGE_THRESHOLD\") per ADR-0006 routing. AC-14 + AC-15 verify charge accumulation correctness."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-018
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§F-3 round cap + ADR-0006 BalanceConstants append — RE2 round-end check reads `BalanceConstants.get_const(\"ROUND_CAP\")` per ADR-0006 routing (no direct file reads); if `_round_number >= ROUND_CAP`, emits `victory_condition_detected(VictoryResult.DRAW)` (int enum value 2). 2 net-new BalanceConstants append to `assets/data/balance/balance_entities.json` (single-line append per ADR-0006 §6 same-patch story-level obligation; lint validates presence): ROUND_CAP=30 + CHARGE_THRESHOLD=40. INIT_SCALE + INIT_CAP already owned by ADR-0009 (no duplicate registration). AC-16 verifies RE2 emits victory_condition_detected(DRAW) → Grid Battle emits authoritative battle_outcome_resolved(DRAW) per ADR-0001 single-owner rule."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-019
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Validation §14 G-15 test isolation reset list — `before_test()` MUST execute 6-element reset sequence to prevent cross-test state leak (R-5 mitigation): (1) `_unit_states.clear()`; (2) `_queue.clear()`; (3) `_round_number = 0`; (4) `_queue_index = 0`; (5) `_round_state = RoundState.BATTLE_NOT_STARTED`; (6) `if GameBus.unit_died.is_connected(_on_unit_died): GameBus.unit_died.disconnect(_on_unit_died)`. Mirrors ADR-0010 + ADR-0005 G-15 reset list patterns. Static-lint check: `grep -L 'unit_died.disconnect' tests/unit/core/turn_order*.gd` returns empty for any file calling TurnOrderRunner methods."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-020
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Validation §AC-18 + §AC-22 victory precedence rules — (1) **Mutual kill PLAYER_WIN precedence (AC-18)**: T7 evaluates `_evaluate_victory()` with player-side precedence — if both player-faction and enemy-faction unit counts reach 0 in same T7 (mutual kill scenario), emit `victory_condition_detected(PLAYER_WIN)` BEFORE PLAYER_LOSE. (2) **T7 PLAYER_WIN beats RE2 DRAW in Round 30 (AC-22)**: when last enemy dies on Round 30 final unit's T7, emit `victory_condition_detected(PLAYER_WIN)` synchronously at T7 (BEFORE RE2 round-cap evaluation triggers DRAW emit). RE2 evaluates AFTER all unit turns complete; T7 emit precedes RE2 evaluation by deterministic order. Both rules tested as dedicated regression tests."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-021
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "§Performance Implications — CPU: queue sort at R3 = O(N log N) with N ≤ 20 units (negligible; AC-23 budget < 1 ms on minimum target hardware mobile); per-attack queries (get_acted_this_turn, get_current_round_number) = O(1) Dictionary lookup + scalar return. Memory: per-battle ~500 bytes total (_queue ~80 bytes for 20 ints + _unit_states Dictionary ~400 bytes for 20 entries × ~20 bytes each + _round_number 4 bytes). Trivial against 512 MB mobile ceiling. Freed at battle teardown via SceneManager (ADR-0002). Load Time: none (TurnOrderRunner created at battle-init, not at app boot). Network: N/A (single-player MVP)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-turn-order-022
    system: turn-order
    gdd: design/gdd/turn-order.md
    adr: docs/architecture/ADR-0011-turn-order.md
    requirement: "Cross-doc unit_id type advisory — ADR-0011 LOCKS `unit_id: int` matching ADR-0001 line 153 signal-contract source-of-truth + ADR-0010 UnitHPState Dictionary[int, UnitHPState] key consistency. ADR-0012 lines 91/109/340/343 originally declared `unit_id: StringName` (stale documentation artifact); type narrowed StringName → int via /architecture-review delta #8 same-patch advisory batch (4 spots edited; delta #7 HP/Status carry + delta #8 Turn Order carry combined). Internal Damage Calc ContextResource fields (lines 186/192/197/201) and call-site references (lines 260/352-353) retain implicit StringName semantics pending follow-up ADR-0012 amendment that will propagate `int` through AttackerContext/DefenderContext factory signatures. Note `hero_id: StringName` (per ADR-0007) vs `unit_id: int` (per ADR-0001/0010/0011) are distinct identifiers — Battle Preparation provides the mapping at BI-1 per turn-order.md §CR-5 tie-break cascade."
    created: 2026-04-30
    revised: ""
    status: active

