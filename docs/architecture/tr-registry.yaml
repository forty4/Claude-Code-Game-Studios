    requirement: "CR-1 + AC-DC-34/35: Stateless / signal-free invariant per ADR-0001 §Damage Calc non-emitter list (line 375). Zero instance fields, zero signal emissions, zero signal subscriptions, zero per-call mutation outside the injected RNG handle. Architecture-registry stance: damage_resolution interface is direct_call, never signal. Static-lint enforcement: 0 matches for `signal ` declarations and `connect(` calls in damage_calc.gd. Forbidden alternative: state mutation (registered as forbidden_pattern damage_calc_state_mutation)."
