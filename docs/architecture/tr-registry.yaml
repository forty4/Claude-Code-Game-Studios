    requirement: "AC-01 — READY-prior consumer access blocked. **PARTIAL — Alpha-deferred per ADR-0006 §7 (CR-4 4-phase pipeline state machine deferred to Alpha)**. MVP equivalent: `BalanceConstants.get_const(key)` returns null + push_error if file missing or key absent (no explicit READY/UNINITIALIZED state machine; lazy on-first-call loading per §Decision 6). Caller stack-trace logging not implemented for MVP (push_error provides callsite context via Godot debugger)."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-balance-data-002
    system: balance-data
    gdd: design/gdd/balance-data.md
    adr: docs/architecture/ADR-0006-balance-data.md
    requirement: "AC-02 — 9 data category Discovery scan with per-category logging. **PARTIAL — Alpha-deferred per ADR-0006 §7 (CR-2 9-category registry deferred to Alpha)**. MVP scope: only `balance_constants` category (1 file: `assets/data/balance/balance_entities.json`). When 2nd category file lands, the loader can transparently detect envelope-vs-flat at parse time and migrate per-file per ADR-0006 §Decision 4."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-balance-data-003
    system: balance-data
    gdd: design/gdd/balance-data.md
    adr: docs/architecture/ADR-0006-balance-data.md
    requirement: "AC-03 — JSON envelope `{schema_version, category, data}` FATAL on missing fields. **PARTIAL — Alpha-deferred per ADR-0006 §7 (CR-3 envelope deferred to Alpha)**. MVP ratifies flat JSON format (no envelope); `balance_entities.json` is `{KEY: value}` map directly per ADR-0006 §Decision 4. Documented MVP-scope deviation; CR-3 envelope migrates to Alpha when 2nd category file lands."
    created: 2026-04-30
    revised: ""
    status: active

  - id: TR-balance-data-004
    system: balance-data
    gdd: design/gdd/balance-data.md
    adr: docs/architecture/ADR-0006-balance-data.md
