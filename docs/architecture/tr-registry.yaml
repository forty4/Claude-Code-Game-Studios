  - id: TR-hp-status-014
    system: hp-status
    gdd: design/gdd/hp-status.md
    adr: docs/architecture/ADR-0010-hp-status.md
    requirement: "§1 + R-1 Re-entrant unit_died emission during DEMORALIZED propagation: when Commander dies, `_propagate_demoralized_radius` is called from inside `apply_damage` Step 4 (after unit_died.emit). If a DEMORALIZED-recipient subscriber synchronously calls back into `apply_damage` (e.g., same-scene AI test fixture), recursion into Dictionary in active-mutation is risky. **Mitigation 1 (production)**: ADR-0001 §5 mandates `CONNECT_DEFERRED` for cross-scene subscribers — eliminates synchronous re-entrancy. **Mitigation 2 (intra-scene)**: `_state_by_unit.keys()` returns Array snapshot (NOT live view) per delta-#7 godot-specialist Item 6 PASS — Dictionary iteration safe even if subscriber appends to UnitHPState's contained Array[StatusEffect] (Dictionary key set unchanged during loop). **Mitigation 3 (tests)**: forbidden_pattern `hp_status_re_entrant_emit_without_deferred` for same-scene subscribers; unit test fixture re-entrant check (subscriber re-emits / re-applies status from within unit_died handler) MUST assert re-entrancy as either safe (deferred-only) or explicitly forbidden."
    created: 2026-04-30
    revised: ""
    status: active

