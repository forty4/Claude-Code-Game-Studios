    requirement: "CR-11 + AC-DC-33/34/35/36: Direct-call interface Grid Battle → DamageCalc.resolve(). Damage Calc has zero outbound calls into HP/Status mutator API; hp_status.apply_damage() is invoked by Grid Battle on HIT, never by Damage Calc. Forbidden alternative: signal-driven resolution (would violate ADR-0001 non-emitter list and AC-DC-42 call-count discipline; registered as forbidden_pattern damage_calc_signal_emission)."
