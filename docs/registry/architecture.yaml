# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: scene_transition_lifecycle
    status: active
    pattern: signal
    producer: scenario-progression  # (via ScenarioRunner, emits battle_launch_requested / consumes battle_outcome_resolved)
    consumers:
      - scene-manager  # listens for battle_launch_requested + battle_outcome_resolved; owns lifecycle
      - input-handling  # listens for ui_input_block_requested / ui_input_unblock_requested
      - scenario-progression  # listens for scene_transition_failed to surface retry/abort dialog
    adr: docs/architecture/ADR-0002-scene-manager.md
    signal_signatures:
      - "battle_launch_requested(payload: BattlePayload)   # ScenarioRunner → SceneManager (ADR-0001 Scenario domain)"
      - "battle_outcome_resolved(outcome: BattleOutcome)   # Grid Battle → SceneManager + ScenarioRunner (ADR-0001 Grid Battle domain)"
      - "ui_input_block_requested(reason: String)          # SceneManager → InputRouter (ADR-0001 UI/Flow domain)"
      - "ui_input_unblock_requested(reason: String)        # SceneManager → InputRouter (ADR-0001 UI/Flow domain)"
      - "scene_transition_failed(context: String, reason: String)  # SceneManager → ScenarioRunner (ADR-0001 UI/Flow domain; added 2026-04-18 amendment)"
    notes: "All cross-scene transitions are signal-driven via GameBus. SceneManager has NO public imperative transition methods. Deferred-free pattern (call_deferred) pushes BattleScene teardown one extra frame to preserve co-subscriber deferred-handler refs."
    referenced_by:
      - docs/architecture/ADR-0001-gamebus-autoload.md
      - docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18
    revised: ""

  - contract: save_persistence_lifecycle
    status: active
    pattern: signal
    producer: scenario-progression  # emits save_checkpoint_requested at CP-1/CP-3
    consumers:
      - save-manager  # primary consumer; performs atomic write
      - scene-manager  # co-producer: emits save_checkpoint_requested at CP-2 boundary (RETURNING_FROM_BATTLE → IDLE)
      - ui  # consumes save_persisted (toast) and save_load_failed (error dialog)
      - scenario-progression  # consumes save_load_failed for player-facing retry/abort dialog
    adr: docs/architecture/ADR-0003-save-load.md
    signal_signatures:
      - "save_checkpoint_requested(source: SaveContext)   # ScenarioRunner + SceneManager → SaveManager (ADR-0001 Persistence domain; ratifies provisional shape)"
      - "save_persisted(chapter_number: int, cp: int)     # SaveManager → UI (after atomic rename succeeds)"
      - "save_load_failed(op: String, reason: String)     # SaveManager → UI + ScenarioRunner (any save/load failure path)"
    notes: "Persistence is exclusively signal-driven. SaveContext passed via signal is a live object; SaveManager MUST duplicate_deep before serialization. Primitive-only payload rule exception documented in ADR-0003."
    referenced_by:
      - docs/architecture/ADR-0001-gamebus-autoload.md
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - contract: map_grid_queries
    status: active
    pattern: direct_call
    producer: map-grid  # MapGrid Node exposes query methods
    consumers:
      - grid-battle       # reads tile state for placement, attack resolution
      - ai                # reads movement range, paths, LoS for decision-making
      - input-handling    # reads get_tile for tap-to-select routing
      - terrain-effect    # reads terrain_type via get_tile
      - formation-bonus   # reads get_adjacent_units for formation evaluation
      - hp-status         # reads get_tile.occupant_id for positional effects
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    method_signatures:
      - "get_tile(coord: Vector2i) -> TileData"
      - "get_movement_range(unit_id: int, move_range: int, unit_type: int) -> PackedVector2Array"
      - "get_path(from: Vector2i, to: Vector2i, unit_type: int) -> PackedVector2Array"
      - "get_attack_range(origin: Vector2i, attack_range: int) -> PackedVector2Array"
      - "get_attack_direction(attacker: Vector2i, defender: Vector2i) -> int"
      - "get_adjacent_units(coord: Vector2i) -> PackedInt32Array"
      - "get_occupied_tiles() -> PackedVector2Array"
      - "has_line_of_sight(from: Vector2i, to: Vector2i) -> bool"
      - "get_map_dimensions() -> Vector2i"
    notes: "Queries are read-only and direct-call (NOT signal-driven) — Map/Grid is documented as a query-first spatial service in ADR-0001 non-emitter list. Hot-path queries (get_movement_range, get_path, has_line_of_sight) read only from the packed caches — never dereference TileData in the inner loop. get_tile returns the TileData Resource directly for cold-path callers that need full tile detail."
    referenced_by:
      - docs/architecture/ADR-0001-gamebus-autoload.md  # lists Map/Grid in non-emitters + Environment exception
      - docs/architecture/ADR-0004-map-grid-data-model.md
