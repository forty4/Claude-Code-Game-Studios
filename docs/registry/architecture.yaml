# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: scene_async_load
    status: active
    api: "ResourceLoader.load_threaded_request(path, 'PackedScene', true) + Timer-polled load_threaded_get_status"
    not: "SceneTree.change_scene_to_packed (destructive — drops ScenarioRunner state)"
    not_also: "Synchronous PackedScene.instantiate() (blocks main thread ~500 ms on mid-range Android — exceeds 16.6 ms frame budget)"
    not_also_2: "Preload all scenes at scenario-select (5 × 80 MB = 400 MB — blows 512 MB mobile ceiling)"
    adr: docs/architecture/ADR-0002-scene-manager.md
    reason: "Mobile-primary (iOS/Android), 512 MB ceiling, 60 fps budget. Async threaded load with progress reporting is the only option that preserves Overworld state AND keeps frame-time smooth. Timer-based status polling (100 ms cadence) keeps emits outside _process per ADR-0001 §7."
    referenced_by:
      - docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18
    revised: ""

  - purpose: overworld_pause_during_battle
    status: active
    api: "process_mode = PROCESS_MODE_DISABLED + visible = false + set_process_input(false) + set_process_unhandled_input(false) + root Control mouse_filter = MOUSE_FILTER_IGNORE (4.5+ recursive disable)"
    not: "get_tree().paused = true (global pause is too broad; SceneManager, GameBus, BattleScene must all stay active)"
    not_also: "queue_free() (would lose ScenarioRunner state and break F-SP-3 Echo retry loop)"
    adr: docs/architecture/ADR-0002-scene-manager.md
    reason: "PROCESS_MODE_DISABLED alone does NOT block _input routing in Godot 4.x. Must explicitly suppress all input paths. Recursive Control disable (4.5+) propagates mouse_filter down the Control tree efficiently."
    referenced_by:
      - docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18
    revised: ""

  - purpose: save_serialization
    status: active
    api: "ResourceSaver.save(snapshot, tmp_path) on a source.duplicate_deep(Resource.DUPLICATE_DEEP_ALL_BUT_SCRIPTS) snapshot. FLAG_COMPRESS is conditional (only if payload measures >50 KB uncompressed)."
    not: "FileAccess + JSON.stringify (manual type coercion for StringName/Array[Resource]; no schema validation; no round-trip guarantee for nested Resources)"
    not_also: "ResourceSaver.save() on the live gameplay SaveContext (torn writes if mutated mid-serialization — duplicate_deep is mandatory)"
    not_also_2: "SQLite via GDExtension (overkill for <50 KB payloads; adds build/platform-port complexity)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "ResourceSaver round-trips typed Resources (Array[EchoMark], StringName, PackedStringArray) losslessly. duplicate_deep decouples the serialization snapshot from live gameplay state, preventing torn writes. DUPLICATE_DEEP_ALL_BUT_SCRIPTS avoids duplicating GDScript instances attached to Resources."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: save_atomic_write
    status: active
    api: "Write to <final>.tmp via ResourceSaver.save, then DirAccess.rename_absolute(tmp, final). Save root is user:// only."
    not: "Direct write to final path (OS kill mid-write leaves half-written file; loader sees corruption)"
    not_also: "External / SAF-backed Android paths (POSIX rename atomicity NOT guaranteed; only user:// = /data/data/<pkg>/files on Android is atomic)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "POSIX rename(2) is atomic on the same filesystem, guaranteed on user:// for iOS (NSApplicationSupportDirectory) and Android internal storage. Loader never observes a partially-written file. If user-facing save export is added later, it MUST be a COPY after the atomic save — never the primary destination."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: save_file_load
    status: active
    api: "ResourceLoader.load(path, '', ResourceLoader.CACHE_MODE_IGNORE) — CACHE_MODE_IGNORE is MANDATORY for every save-file load."
    not: "ResourceLoader.load(path) default cache mode (returns stale cached object after overwrite in the same session — silent correctness bug)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "Godot's Resource cache is not invalidated by filesystem writes. After SaveManager writes over slot_1/ch_01_cp_2.res, a cached load returns the pre-write object. Bug only surfaces on second load of same slot — exactly the scenario that looks fine in casual testing."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: save_directory_scan
    status: active
    api: "DirAccess.get_files_at(dir_path) — Godot 4.6 idiomatic replacement for legacy list_dir_begin() loop."
    not: "DirAccess.list_dir_begin() + get_next() / list_dir_end() loop (legacy in 4.6; still functional but verbose and error-prone)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "get_files_at returns a PackedStringArray directly; simpler, less stateful, no need to manage begin/end lifecycle. Verified idiomatic in engine-reference 4.6 docs."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: map_tile_storage
    status: active
    api: "MapResource extends Resource with @export var tiles: Array[TileData]. TileData extends Resource with @export fields. Flat indexing: tiles[coord.y * map_cols + coord.x] (row * cols + col). Authored in .tres text format, shipped as binary .res."
    not: "TileMapLayer + parallel TileData overlay (two sources of truth requiring sync on every mutation; ink-wash aesthetic is unidiomatic for atlas-tileset authoring)"
    not_also: "Struct-of-Arrays PackedInt32Array per field as primary storage (not @export-friendly; schema extension requires manual migration of all parallel arrays; violates ADR-0003 typed-Resource convention)"
    not_also_2: "Dictionary[Vector2i, TileData] keyed by coord (hash overhead per access; breaks row*cols+col indexing mandated by map-grid.md CR-2)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "Aligns with ADR-0003's typed-Resource + @export save convention. .tres inspector authoring works out of the box (resolves map-grid.md Open Question #2). ~77KB per max-size (40×30) map = well under mobile ceiling. map-grid.md CR-2 mandates flat row*cols+col indexing."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
      - design/gdd/map-grid.md
    added: 2026-04-18
    revised: ""

  - purpose: map_hot_path_queries
    status: active
    api: "MapGrid builds parallel PackedInt32Array + PackedByteArray caches from Array[TileData] on load_map(). Pathfinding (Dijkstra), attack-range fanout, and LoS (Bresenham) read ONLY from the packed caches. Array[TileData] is authoritative for mutation and serialization; cache is a structural read-optimization. Every mutation writes through to both sides in the same call."
    not: "Direct TileData dereference in Dijkstra inner loop (GDScript Object virtual dispatch per tile × ~300 tiles frontier at move_range=10 exceeds the 16ms AC-PERF-2 budget on mid-range Android)"
    not_also: "Dictionary-based visited set in Dijkstra (hash allocation in hot loop; use PackedByteArray flag buffer indexed by row*cols+col instead)"
    not_also_2: "Class-based priority queue for Dijkstra frontier (GDScript dispatch overhead; at <100-entry peak frontier, sorted PackedInt32Array + bsearch outperforms heapify)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "TileData Resource dereference is the dominant Dijkstra cost, not the algorithm. Parallel packed caches eliminate virtual dispatch in the hot loop while preserving .tres authoring ergonomics. Required to hit map-grid.md AC-PERF-2 (<16ms get_movement_range on 40×30, move_range=10) on mobile. Identified as BLOCKING by godot-specialist review 2026-04-18."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18
    revised: ""

  - purpose: grid_pathfinding
    status: active
    api: "Custom Dijkstra inline on MapGrid. 4-directional adjacency. Per-unit-type × per-terrain-type cost lookup (cost matrix owned by ADR-0008 Terrain Effect). Early termination when remaining_budget < min_remaining_cost. Static typing throughout; no is_instance_valid() or typeof() in inner loop. PackedByteArray visited set. Sorted PackedInt32Array frontier with packed (cost<<16|tile_index) entries."
    not: "AStarGrid2D (explicitly REJECTED by map-grid.md CR-6 — the 4-dir + custom per-unit-type-per-terrain-type cost formula is cheaper and more deterministic than Godot's A* abstraction for this problem size)"
    not_also: "NavigationServer2D + NavigationRegion2D (mesh-based pathfinding is overkill for a 40×30 grid and does not model the per-unit-type cost matrix natively)"
    not_also_2: "NavigationAgent2D (continuous-space agent; map-grid.md F-3 requires integer-cost tile-step pathfinding)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "map-grid.md CR-6 is an explicit design-level constraint. Custom Dijkstra with 4-dir + early termination runs under 5ms on mobile at 40×30 / move_range=10, well inside the 16ms AC-PERF-2 budget. Custom implementation is trivially benchmarkable and deterministic — no hidden Godot-internal complexity."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
      - design/gdd/map-grid.md
    added: 2026-04-18
    revised: ""

  - purpose: map_authoring_pipeline
    status: active
    api: "Source-of-truth in version control: .tres text format at res://data/maps/[map_id].tres. Authored in Godot inspector on MapResource + TileData sub-resources. Shipped builds: binary .res via Godot's export import settings. ResourceLoader.load(path, '', CACHE_MODE_IGNORE) on battle enter (mirrors ADR-0003 save-load pattern for uniformity)."
    not: "Custom editor plugin for MVP (deferred — acceptable if inspector scrolling on 40×30 is slow)"
    not_also: "JSON / YAML external format (loses @export typing; adds parser + round-trip validation surface)"
    not_also_2: "Binary .res as source-of-truth in VC (unreviewable diffs; must stay text .tres in VC)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "Resolves map-grid.md Open Question #2. .tres preserves reviewable diffs in version control; .res in shipped builds cuts load time roughly in half vs .tres. CACHE_MODE_IGNORE keeps the battle-scoped Resource-load pattern uniform with ADR-0003 save loads and sidesteps stale-asset issues during iteration."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18
    revised: ""

