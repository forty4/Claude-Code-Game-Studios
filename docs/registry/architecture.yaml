      - "HPStatusController.get_status_effects(unit_id: int) -> Array  # shallow copy; consumer mutation forbidden per hp_status_consumer_mutation forbidden_pattern"
    notes: "HPStatusController is the sole emitter of unit_died per ADR-0001 §7 Signal Contract Schema line 155; HP/Status is non-emitter by behavior for all OTHER 21 GameBus signals across 8 domains per the hp_status_signal_emission_outside_unit_died forbidden_pattern. Hybrid pattern (signal for unit_died + direct_call for query/mutation) preserves AC-DC-42 call-count discipline (ADR-0012 line 260 sole-caller contract for apply_damage cannot be satisfied via signal indirection; signal subscribers cannot be reliably counted). _apply_turn_start_tick(unit_id) is the test seam (mirrors ADR-0005 _handle_event + ADR-0012 RNG-injection pattern; mirrors damage-calc story-006 11-story track record). DEFEND_STANCE_ATK_PENALTY pre-folding into get_modified_stat means Damage Calc consumes the already-modified ATK value and does NOT separately apply the penalty (closes ADR-0012 line 89-93 'pre-folded' contract). Carried advisory for next ADR-0012 amendment: parameter type unit_id: StringName at lines 89/260 → unit_id: int to match ADR-0001 + ADR-0010 (queues with ADR-0001 line 168 + line 372 cross-doc advisories from ADR-0005 + ADR-0007)."
