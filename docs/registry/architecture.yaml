    added: 2026-04-18
    revised: ""

  - contract: environment_events
    status: active
    pattern: signal
    producer: map-grid  # MapGrid emits from inside apply_tile_damage when destruction_hp reaches 0
    consumers:
      - ai               # invalidates cached paths touching the destroyed coord
      - formation-bonus  # re-checks adjacency for formations touching coord
      - vfx              # plays destruction effect at coord
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    signal_signatures:
      - "tile_destroyed(coord: Vector2i)   # MapGrid → AI / Formation Bonus / VFX (ADR-0001 Environment domain #10, added 2026-04-18 amendment)"
    notes: "Single-primitive payload (Vector2i) is the canonical form for 1-field signals per TR-gamebus-001 (≥2 fields triggers the typed-Resource requirement, not ≥1). Consumers look up post-destruction state via MapGrid.get_tile(coord). No other Map/Grid state change may become a signal without a superseding ADR."
    referenced_by:
      - docs/architecture/ADR-0001-gamebus-autoload.md  # §10 Environment domain + non-emitter list exception
      - docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18
    revised: ""

  - contract: damage_resolution
