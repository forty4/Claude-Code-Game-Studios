    consumers:
      - grid-battle           # invokes apply_damage on HIT (per ADR-0012 line 260 sole-caller contract); subscribes to unit_died for victory check
      - damage-calc           # reads get_modified_stat(unit_id, stat_name) for AttackerContext.raw_atk / DefenderContext.raw_def per ADR-0012 lines 89-93, 340-352
      - turn-order            # subscribes to unit_died (removes unit from queue); HP/Status consumes unit_turn_started in reverse direction (provisional ADR-0011) for DoT tick + duration decrement
      - battle-hud            # reads get_current_hp / get_max_hp / get_status_effects per frame for HP bar + status icon rendering
      - ai                    # reads is_alive / get_current_hp / get_max_hp ratio for threat eval + get_status_effects for buff/debuff awareness
      - skills-items          # invokes apply_heal + apply_status (skill / item effects on hit per CR-5b)
      - scenario-progression  # invokes apply_status for scenario-event applied effects (e.g., 강행군 → EXHAUSTED)
      - battle-preparation    # invokes initialize_unit at battle-init for each participating unit (provisional contract)
      - tutorial              # subscribes to unit_died for tutorial step detection (provisional)
    adr: docs/architecture/ADR-0010-hp-status.md
    signal_signatures:
      - "unit_died(unit_id: int)                                   # HPStatusController → all consumers (ADR-0001 HP/Status domain line 155; single-primitive payload)"
      - "unit_turn_started(unit_id: int)                           # Turn Order → HPStatusController (CONSUMED; defined by ADR-0011 Proposed 2026-04-30 — pending Acceptance via /architecture-review delta #8; drives DoT tick + duration decrement + DEFEND_STANCE 1-turn expiry + DEMORALIZED CONDITION_BASED recovery check per ADR-0010 §5+§8)"
    direct_call_signatures:
      - "HPStatusController.initialize_unit(unit_id: int, hero: HeroData, unit_class: int) -> void"
      - "HPStatusController.apply_damage(unit_id: int, resolved_damage: int, attack_type: int, source_flags: Array) -> void  # Grid Battle sole caller per ADR-0012 line 260"
      - "HPStatusController.apply_heal(unit_id: int, raw_heal: int, source_unit_id: int) -> int  # returns actual heal applied"
      - "HPStatusController.apply_status(unit_id: int, effect_template_id: StringName, duration_override: int, source_unit_id: int) -> bool  # returns false on rejection (CR-7 mutex / dead unit / unknown template)"
      - "HPStatusController.get_current_hp(unit_id: int) -> int"
      - "HPStatusController.get_max_hp(unit_id: int) -> int"
      - "HPStatusController.is_alive(unit_id: int) -> bool"
