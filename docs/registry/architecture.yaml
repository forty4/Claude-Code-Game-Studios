# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: per_frame_resource_load_polling
    status: active
    description: "Polling ResourceLoader.load_threaded_get_status (or any I/O status) from _process or _physics_process is banned. Use a Timer node at ≥100 ms cadence instead."
    why: "ADR-0001 §Implementation Guidelines §7 forbids emits from _process. Status polling in _process inevitably triggers emits (ui_input_unblock_requested on completion) from within the per-frame context, violating the ADR-0001 contract. Timer-based polling moves the emit out of _process into a discrete handler."
    adr: docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18

  - pattern: direct_scene_instantiation_across_boundary
    status: active
    description: "Systems must not directly call PackedScene.instantiate() or SceneTree.change_scene_to_packed() to cross the Overworld ↔ BattleScene boundary. Only SceneManager is allowed to perform the transition, and transitions are signal-driven (battle_launch_requested / battle_outcome_resolved)."
    why: "Ad-hoc scene instantiation across feature branches produces inconsistent scene trees, undefined co-subscriber handler ordering, and scene-reload hazards. Single-owner SceneManager ensures the deferred-free pattern is applied uniformly."
    adr: docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18

  - pattern: queue_free_battle_scene_without_deferral
    status: active
    description: "Freeing BattleScene directly (without call_deferred) inside a CONNECT_DEFERRED handler of battle_outcome_resolved is banned. Must use call_deferred('_free_battle_scene_and_restore_overworld') to push the free one additional frame."
    why: "Co-subscribers (ScenarioRunner) connect DEFERRED to the same signal. Handler execution order within a deferred frame is undefined. A direct queue_free from SceneManager's handler may free BattleScene before ScenarioRunner's same-frame handler completes, leaving ScenarioRunner with dangling node references. The extra-frame defer guarantees all same-frame deferred handlers complete first."
    adr: docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18

  - pattern: non_exported_save_field
    status: active
    description: "Every field on SaveContext, EchoMark, or any Resource reachable from SaveContext that must persist MUST be annotated with @export. Non-exported fields are silently dropped by ResourceSaver with no warning."
    why: "ADR-0003 defines SaveContext as the persistence contract. A missing @export is a silent data-loss bug that surfaces only when the field is read back and found to be the class default. This is the #1 footgun of the ResourceSaver pipeline. EchoMark in particular extends Resource, declares class_name EchoMark, and every persisted field @export-annotated — no exceptions."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: saf_external_save_path
    status: active
    description: "Writing save files anywhere other than user:// (specifically: Android SAF-backed external storage paths, content:// URIs, /sdcard/ paths, or any user-picker-provided destination) is banned for primary saves."
    why: "DirAccess.rename_absolute() atomicity is guaranteed only on same-filesystem POSIX rename (user:// on iOS NSApplicationSupportDirectory and Android internal /data/data/<pkg>/files). SAF-backed external paths route through a document provider that does NOT guarantee atomic rename — partial writes can survive, producing corrupt saves. Any user-facing 'export save' feature MUST be implemented as a COPY after the atomic primary save completes."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: cached_save_load
    status: active
    description: "Loading a save file via ResourceLoader without passing CACHE_MODE_IGNORE is banned. Every call site MUST be: ResourceLoader.load(path, '', ResourceLoader.CACHE_MODE_IGNORE)."
    why: "Godot's Resource cache is keyed by path. After SaveManager.save_checkpoint overwrites slot_1/ch_01_cp_2.res, a subsequent default-cache load returns the pre-write cached instance. Only surfaces on second load of the same slot in one session, which is why casual testing misses it. CACHE_MODE_IGNORE makes the load always hit disk."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: non_pure_migration_callable
    status: active
    description: "Migration functions registered in SaveMigrationRegistry._migrations MUST be pure functions operating only on the SaveContext argument. They MUST NOT close over (capture) any node, autoload, singleton, or object reference from the enclosing scope."
    why: "The migration registry is a static Dictionary; Callables stored in it are held for the registry's lifetime = process lifetime. Captured references are pinned alive, creating memory leaks and — worse — dangling references into freed scenes when a migration references, e.g., a ScenarioRunner node from a prior session. Purity is the contract."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: tile_data_external_subresource
    status: active
    description: "TileData Resources MUST remain inline inside MapResource.tres files. Extracting TileData to shared .tres presets with UIDs (e.g., a shared 'mountain_preset.tres' referenced from many maps) is banned for as long as ADR-0004 stands. A refactor to shared presets requires a superseding ADR."
    why: "Godot 4.5+ Resource.duplicate_deep() only recursively clones EMBEDDED sub-resources. External UID-referenced sub-resources return the same shared instance. If TileData were extracted to a shared preset and a battle destroys a tile, the destruction state would mutate the shared preset and leak into every other map referencing the same preset. MVP is safe because TileData is inline; the constraint exists to prevent a silent correctness bug when someone 'refactors for reuse' later."
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18

  - pattern: astar_grid2d_for_tactical_pathfinding
    status: active
    description: "Godot's AStarGrid2D and NavigationServer2D / NavigationAgent2D MUST NOT be used for unit movement pathfinding on the tactical battle grid. Pathfinding on the tactical grid is custom Dijkstra inline on MapGrid per ADR-0004."
    why: "map-grid.md CR-6 explicitly rejects AStarGrid2D. Godot's grid-A* does not model the per-unit-type × per-terrain-type cost matrix required by ADR-0008 Terrain Effect; adapting it to this game's cost formula would require either overriding _compute_cost (slower than custom Dijkstra) or flattening the cost matrix into a weight-per-tile approximation (loses unit-type variance). NavigationServer2D is continuous-space mesh pathfinding — not a tile-step grid model. This ban applies ONLY to tactical battle pathfinding; overworld navigation (if ever added) may use any engine API without this constraint."
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18

  - pattern: map_grid_cache_sync_bypass
    status: active
    description: "MapGrid's Array[TileData] and parallel packed caches (PackedInt32Array for terrain_type/elevation/occupant_id/tile_state; PackedByteArray for is_passable_base) MUST be kept synchronized. Every mutation to a TileData field that has a cache MUST write through to the cache entry in the same call. No ad-hoc writes to one side are permitted. All mutations route through the three public mutation methods (set_occupant, clear_occupant, apply_tile_damage)."
    why: "The packed caches are a structural read-optimization for AC-PERF-2. Pathfinding and LoS hot paths read ONLY from the caches — they never dereference TileData. If a mutation updates the Array[TileData] but not the cache (or vice-versa), queries return stale data. This is a silent correctness bug that surfaces only when a query fires between the mutation and the missed cache update — exactly the timing casual testing misses. Single-mutation-entry-point discipline + unit tests on every mutation path is the mitigation."
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18

