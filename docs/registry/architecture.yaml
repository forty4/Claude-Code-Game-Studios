# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: scene_async_load
    status: active
    api: "ResourceLoader.load_threaded_request(path, 'PackedScene', true) + Timer-polled load_threaded_get_status"
    not: "SceneTree.change_scene_to_packed (destructive — drops ScenarioRunner state)"
    not_also: "Synchronous PackedScene.instantiate() (blocks main thread ~500 ms on mid-range Android — exceeds 16.6 ms frame budget)"
    not_also_2: "Preload all scenes at scenario-select (5 × 80 MB = 400 MB — blows 512 MB mobile ceiling)"
    adr: docs/architecture/ADR-0002-scene-manager.md
    reason: "Mobile-primary (iOS/Android), 512 MB ceiling, 60 fps budget. Async threaded load with progress reporting is the only option that preserves Overworld state AND keeps frame-time smooth. Timer-based status polling (100 ms cadence) keeps emits outside _process per ADR-0001 §7."
    referenced_by:
      - docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18
    revised: ""

  - purpose: overworld_pause_during_battle
    status: active
    api: "process_mode = PROCESS_MODE_DISABLED + visible = false + set_process_input(false) + set_process_unhandled_input(false) + root Control mouse_filter = MOUSE_FILTER_IGNORE (4.5+ recursive disable)"
    not: "get_tree().paused = true (global pause is too broad; SceneManager, GameBus, BattleScene must all stay active)"
    not_also: "queue_free() (would lose ScenarioRunner state and break F-SP-3 Echo retry loop)"
    adr: docs/architecture/ADR-0002-scene-manager.md
    reason: "PROCESS_MODE_DISABLED alone does NOT block _input routing in Godot 4.x. Must explicitly suppress all input paths. Recursive Control disable (4.5+) propagates mouse_filter down the Control tree efficiently."
    referenced_by:
      - docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18
    revised: ""

  - purpose: save_serialization
    status: active
    api: "ResourceSaver.save(snapshot, tmp_path) on a source.duplicate_deep(Resource.DUPLICATE_DEEP_ALL_BUT_SCRIPTS) snapshot. FLAG_COMPRESS is conditional (only if payload measures >50 KB uncompressed)."
    not: "FileAccess + JSON.stringify (manual type coercion for StringName/Array[Resource]; no schema validation; no round-trip guarantee for nested Resources)"
    not_also: "ResourceSaver.save() on the live gameplay SaveContext (torn writes if mutated mid-serialization — duplicate_deep is mandatory)"
    not_also_2: "SQLite via GDExtension (overkill for <50 KB payloads; adds build/platform-port complexity)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "ResourceSaver round-trips typed Resources (Array[EchoMark], StringName, PackedStringArray) losslessly. duplicate_deep decouples the serialization snapshot from live gameplay state, preventing torn writes. DUPLICATE_DEEP_ALL_BUT_SCRIPTS avoids duplicating GDScript instances attached to Resources."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: save_atomic_write
    status: active
    api: "Write to <final>.tmp via ResourceSaver.save, then DirAccess.rename_absolute(tmp, final). Save root is user:// only."
    not: "Direct write to final path (OS kill mid-write leaves half-written file; loader sees corruption)"
    not_also: "External / SAF-backed Android paths (POSIX rename atomicity NOT guaranteed; only user:// = /data/data/<pkg>/files on Android is atomic)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "POSIX rename(2) is atomic on the same filesystem, guaranteed on user:// for iOS (NSApplicationSupportDirectory) and Android internal storage. Loader never observes a partially-written file. If user-facing save export is added later, it MUST be a COPY after the atomic save — never the primary destination."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: save_file_load
    status: active
    api: "ResourceLoader.load(path, '', ResourceLoader.CACHE_MODE_IGNORE) — CACHE_MODE_IGNORE is MANDATORY for every save-file load."
    not: "ResourceLoader.load(path) default cache mode (returns stale cached object after overwrite in the same session — silent correctness bug)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "Godot's Resource cache is not invalidated by filesystem writes. After SaveManager writes over slot_1/ch_01_cp_2.res, a cached load returns the pre-write object. Bug only surfaces on second load of same slot — exactly the scenario that looks fine in casual testing."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: save_directory_scan
    status: active
    api: "DirAccess.get_files_at(dir_path) — Godot 4.6 idiomatic replacement for legacy list_dir_begin() loop."
    not: "DirAccess.list_dir_begin() + get_next() / list_dir_end() loop (legacy in 4.6; still functional but verbose and error-prone)"
    adr: docs/architecture/ADR-0003-save-load.md
    reason: "get_files_at returns a PackedStringArray directly; simpler, less stateful, no need to manage begin/end lifecycle. Verified idiomatic in engine-reference 4.6 docs."
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - purpose: map_tile_storage
    status: active
    api: "MapResource extends Resource with @export var tiles: Array[TileData]. TileData extends Resource with @export fields. Flat indexing: tiles[coord.y * map_cols + coord.x] (row * cols + col). Authored in .tres text format, shipped as binary .res."
    not: "TileMapLayer + parallel TileData overlay (two sources of truth requiring sync on every mutation; ink-wash aesthetic is unidiomatic for atlas-tileset authoring)"
    not_also: "Struct-of-Arrays PackedInt32Array per field as primary storage (not @export-friendly; schema extension requires manual migration of all parallel arrays; violates ADR-0003 typed-Resource convention)"
    not_also_2: "Dictionary[Vector2i, TileData] keyed by coord (hash overhead per access; breaks row*cols+col indexing mandated by map-grid.md CR-2)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "Aligns with ADR-0003's typed-Resource + @export save convention. .tres inspector authoring works out of the box (resolves map-grid.md Open Question #2). ~77KB per max-size (40×30) map = well under mobile ceiling. map-grid.md CR-2 mandates flat row*cols+col indexing."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
      - design/gdd/map-grid.md
    added: 2026-04-18
    revised: ""

  - purpose: map_hot_path_queries
    status: active
    api: "MapGrid builds parallel PackedInt32Array + PackedByteArray caches from Array[TileData] on load_map(). Pathfinding (Dijkstra), attack-range fanout, and LoS (Bresenham) read ONLY from the packed caches. Array[TileData] is authoritative for mutation and serialization; cache is a structural read-optimization. Every mutation writes through to both sides in the same call."
    not: "Direct TileData dereference in Dijkstra inner loop (GDScript Object virtual dispatch per tile × ~300 tiles frontier at move_range=10 exceeds the 16ms AC-PERF-2 budget on mid-range Android)"
    not_also: "Dictionary-based visited set in Dijkstra (hash allocation in hot loop; use PackedByteArray flag buffer indexed by row*cols+col instead)"
    not_also_2: "Class-based priority queue for Dijkstra frontier (GDScript dispatch overhead; at <100-entry peak frontier, sorted PackedInt32Array + bsearch outperforms heapify)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "TileData Resource dereference is the dominant Dijkstra cost, not the algorithm. Parallel packed caches eliminate virtual dispatch in the hot loop while preserving .tres authoring ergonomics. Required to hit map-grid.md AC-PERF-2 (<16ms get_movement_range on 40×30, move_range=10) on mobile. Identified as BLOCKING by godot-specialist review 2026-04-18."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18
    revised: ""

  - purpose: grid_pathfinding
    status: active
    api: "Custom Dijkstra inline on MapGrid. 4-directional adjacency. Per-unit-type × per-terrain-type cost lookup (cost matrix owned by ADR-0008 Terrain Effect). Early termination when remaining_budget < min_remaining_cost. Static typing throughout; no is_instance_valid() or typeof() in inner loop. PackedByteArray visited set. Sorted PackedInt32Array frontier with packed (cost<<16|tile_index) entries."
    not: "AStarGrid2D (explicitly REJECTED by map-grid.md CR-6 — the 4-dir + custom per-unit-type-per-terrain-type cost formula is cheaper and more deterministic than Godot's A* abstraction for this problem size)"
    not_also: "NavigationServer2D + NavigationRegion2D (mesh-based pathfinding is overkill for a 40×30 grid and does not model the per-unit-type cost matrix natively)"
    not_also_2: "NavigationAgent2D (continuous-space agent; map-grid.md F-3 requires integer-cost tile-step pathfinding)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "map-grid.md CR-6 is an explicit design-level constraint. Custom Dijkstra with 4-dir + early termination runs under 5ms on mobile at 40×30 / move_range=10, well inside the 16ms AC-PERF-2 budget. Custom implementation is trivially benchmarkable and deterministic — no hidden Godot-internal complexity."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
      - design/gdd/map-grid.md
    added: 2026-04-18
    revised: ""

  - purpose: map_authoring_pipeline
    status: active
    api: "Source-of-truth in version control: .tres text format at res://data/maps/[map_id].tres. Authored in Godot inspector on MapResource + TileData sub-resources. Shipped builds: binary .res via Godot's export import settings. ResourceLoader.load(path, '', CACHE_MODE_IGNORE) on battle enter (mirrors ADR-0003 save-load pattern for uniformity)."
    not: "Custom editor plugin for MVP (deferred — acceptable if inspector scrolling on 40×30 is slow)"
    not_also: "JSON / YAML external format (loses @export typing; adds parser + round-trip validation surface)"
    not_also_2: "Binary .res as source-of-truth in VC (unreviewable diffs; must stay text .tres in VC)"
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    reason: "Resolves map-grid.md Open Question #2. .tres preserves reviewable diffs in version control; .res in shipped builds cuts load time roughly in half vs .tres. CACHE_MODE_IGNORE keeps the battle-scoped Resource-load pattern uniform with ADR-0003 save loads and sidesteps stale-asset issues during iteration."
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18
    revised: ""

  - purpose: hero_database_module_form
    status: active
    api: "class_name HeroDatabase extends RefCounted + @abstract decoration + all-static methods + lazy-init JSON config from assets/data/heroes/heroes.json (instance-form JSON.new().parse() for line/col diagnostics) + Dictionary[StringName, HeroData] typed cache (Godot 4.4+ typed Dictionaries). HeroData Resource (26 @export fields, locally-scoped HeroFaction enum) is the typed payload. default_class stored as int (NOT typed UnitRole.UnitClass @export) — cross-script @export typed-enum is brittle in Godot 4.x Inspector authoring (silent int fallback when typed-enum reference fails to resolve); cross-doc convention enforces 1:1 alignment with UnitRole.UnitClass [0,5]. relationships: Array[Dictionary] provisional until Formation Bonus ADR ratifies typed Array[HeroRelationship]. equipment_slot_override: Array[int] until Equipment ADR canonicalizes WEAPON/ARMOR/MOUNT/ACCESSORY enum mapping. join_condition_tag: String opaque until Scenario Progression ADR canonicalizes tag vocabulary."
    not: "Battle-scoped Node holding heroes during battle (rejected — cross-scene consumers Battle Preparation + Scenario Progression demand session-persistent cache; stateful violates 4-precedent stateless-static pattern; cross-scene reload cost is ~50ms per JSON parse, acceptable once per session not per battle)"
    not_also: "Per-hero .tres Resources at assets/data/heroes/[hero_id].tres × 8-10 (rejected — file management overhead vs single file; harder to PR-diff binary-ish .tres text; harder for designers using spreadsheet → JSON pipelines per balance-data.md OQ-5; ADR-0006 § Alternative C / ADR-0008 / ADR-0009 all chose JSON over per-record .tres; switching splits the data pipeline)"
    not_also_2: "Hand-coded const class with inlined Dictionary literal `const HEROES = {...}` (rejected — violates GDD data-driven requirement; mirrors AC-DC-48/AC-20/CR-10 hardcoded-values blocker bug; designers cannot retune via JSON edit; spreadsheet pipeline integration impossible)"
    not_also_3: "Full DataRegistry pipeline now (rejected — ADR-0006 § Alternative A already deferred Discovery/Parse/Validate/Build 4-phase pipeline + 9-category framework + hot reload + schema versioning to Alpha; reinstating contradicts ADR-0006 precedent without new evidence; over-building for 1-file-1-category MVP)"
    adr: docs/architecture/ADR-0007-hero-database.md
    reason: "5th-precedent stateless-static pattern (ADR-0008 → 0006 → 0012 → 0009 → 0007). Cross-Foundation/Core consistency is the load-bearing benefit; future Foundation/Core data-layer ADRs (Skill, Formation, Equipment, Character Growth) inherit the pattern. Mobile budgets (60fps / 16.6ms) handle <0.05ms per query cost comfortably for 10-hero MVP and forward-compat to 100-hero Alpha (AC-15 100ms load target). Dictionary[StringName, HeroData] typed (Godot 4.4+ typed Dictionaries) — static-typing project preference per technical-preferences.md. Lazy-init follows ADR-0006 BalanceConstants pattern: session-persistent cache, no eager-load at boot, before_test() reset obligation per G-15."
    referenced_by:
      - docs/architecture/ADR-0007-hero-database.md
    added: 2026-04-29
    revised: ""

  - purpose: unit_role_module_form
    status: active
    api: "class_name UnitRole extends RefCounted + @abstract decoration + all-static methods + lazy-init JSON config from assets/data/config/unit_roles.json (instance-form JSON.new().parse() for line/col diagnostics) + BalanceConstants.get_const(key) for global caps + typed UnitRole.UnitClass enum parameter binding (improvement over ADR-0008's raw int terrain_type)"
    not: "Battle-scoped Node with per-unit derived-stats cache (rejected — stateful; GDD §States and Transitions explicit 'stateless rule definition layer' invariant; cache-invalidation hazard with HP/Status's get_modified_stat accessor per ADR-0012 §Dependencies)"
    not_also: "Autoload singleton at /root/UnitRole (rejected — no shared state to motivate autoload; 3-precedent class_name pattern established by ADR-0008/ADR-0006/ADR-0012; test-isolation friction per G-15 BalanceConstants pattern)"
    not_also_2: "StringName-tag UnitClass representation (rejected — slower than int enum bracket index; re-opens ADR-0012 EC-DC-25/AC-DC-51 silent-fail surface that Array[StringName] vs Array[String] precedent closed)"
    not_also_3: "Single bundled derive_unit_stats(hero, class) -> UnitStats Resource (rejected — couples consumers to full derivation cost; no consumer needs the bundle; orthogonal per-stat methods are simpler)"
    adr: docs/architecture/ADR-0009-unit-role.md
    reason: "Reuses 4-precedent stateless-static pattern (ADR-0008 → ADR-0006 → ADR-0012 → ADR-0009). Mobile budgets (60fps / 16.6ms) handle <0.6ms one-time battle-init derivation comfortably. Typed UnitRole.UnitClass enum parameter binding produces stricter parse-time errors at call sites than raw int (godot-specialist 2026-04-28 validated). Lazy-init follows ADR-0006 BalanceConstants pattern: session-persistent cache, no eager-load at boot, before_test() reset obligation per G-15."
    referenced_by:
      - docs/architecture/ADR-0009-unit-role.md
    added: 2026-04-28
    revised: ""

  - purpose: input_map_population
    status: active
    api: "InputMap.add_action(action: StringName) + InputMap.action_add_event(action: StringName, event: InputEvent) for runtime InputMap population from assets/data/input/default_bindings.json. Typed InputEvent subclasses (InputEventKey, InputEventMouseButton, InputEventJoypadButton) constructed from JSON event descriptors via direct property assignment (e.g., var ev := InputEventKey.new(); ev.physical_keycode = KEY_ENTER)."
    not: "Input.parse_input_event(event) — that method is event INJECTION (sends synthetic event through engine pipeline triggering _input/_unhandled_input), NOT InputMap population. Use it only for the §8 DI test seam — see input_router_test_seam api_decision."
    adr: docs/architecture/ADR-0005-input-handling.md
    reason: "Distinct API roles confused in ADR draft pre-Write — godot-specialist 2026-04-30 Item 8 caught the factual error. InputMap.add_action + action_add_event is the canonical runtime population path (verified against Godot 4.6 modules/input.md). Input.parse_input_event is reserved for synthetic injection use cases (test seam OR force-firing an action programmatically)."
    referenced_by:
      - docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30
    revised: ""

  - purpose: input_router_test_seam
    status: active
    api: "InputRouter._handle_event(event: InputEvent) -> void — sole DI test seam for synthetic event injection in unit tests. GdUnit4 tests construct InputEvent subclasses directly and call _handle_event(synthetic_event) without going through Godot's _input/_unhandled_input dispatch. Production callers forbidden by _-prefix convention."
    not: "Input.parse_input_event(synthetic_event) — that goes through the full engine pipeline (_input → _unhandled_input → InputRouter); slower and couples test to engine-version event-routing semantics. Use only for end-to-end integration tests when isolated state-machine tests are insufficient."
    not_also: "Reflectively calling private dispatch methods (_transition_from_observation, etc.) — bypasses the event-classification + active_mode update + signal emission centralized in _handle_event."
    adr: docs/architecture/ADR-0005-input-handling.md
    reason: "Mirrors damage-calc story-006 RNG-injection seam pattern (proven 11 stories). Reusable for future event-listening systems (Camera + Battle HUD); pattern stable at 1 invocation pre-Camera ADR. Test isolation requires before_test() reset of _state + _active_mode + _undo_windows + _input_blocked_reasons (G-15 mirror obligation per forbidden_patterns.input_router_static_var_state_addition entry)."
    referenced_by:
      - docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30
    revised: ""

  - purpose: hp_status_module_form
    status: active
    api: "class_name HPStatusController extends Node + battle-scoped child of BattleScene (created at battle-init via Battle Preparation, freed automatically with BattleScene per ADR-0002 SceneManager teardown — non-persistence enforced by lifecycle alignment per CR-1b) + Dictionary[int, UnitHPState] keyed by unit_id (matches ADR-0001 unit_died(int) payload type) + UnitHPState RefCounted per-unit (NOT Resource — battle-scoped non-persistent) + StatusEffect/TickEffect typed Resource @export with .tres template authoring at assets/data/status_effects/{poison,demoralized,defend_stance,inspired,exhausted}.tres + 4 mutator + 5 query public methods + 1 emitted signal (unit_died on /root/GameBus per ADR-0001 line 155) + 1 consumed signal (unit_turn_started provisional ADR-0011) + 27 tuning constants via BalanceConstants.get_const(key) per ADR-0006."
    not: "Autoload Node /root/HPStatusManager — rejected per Alternative 1: GDD CR-1b mandates HP non-persistence between battles; autoload form requires explicit reset (extra mutation, easy to forget); battle-scoped form provides cleaner non-persistence enforcement (state freed automatically when BattleScene is freed). ADR-0004 Map/Grid is the closer precedent (battle-scoped, non-persistent, freed with BattleScene)."
    not_also: "Per-unit Component Node attached to BattleUnit nodes — rejected per Alternative 2: cross-unit queries (DEMORALIZED radius scan, AI threat eval over multiple units) become N-way Node traversals via get_node() chains or get_tree().get_nodes_in_group(); coupling HP/Status's lifecycle to BattleUnit creates tighter dependency than necessary; per-unit signals + bus relay would violate ADR-0001 sole-emitter contract for unit_died (bus relay would need to fan-in N×1 connections to GameBus). Centralized HPStatusController provides O(1) Dictionary lookup vs Node traversal + simpler test fixtures + ADR-0001 contract compliance."
    not_also_2: "Stateless-static utility class with static var _state_by_unit (5-precedent ADR-0008→0007 pattern) — rejected per Alternative 3: ARCHITECTURALLY INCOMPATIBLE per ADR-0005 §Alternative 4 pattern boundary. (a) HP/Status holds mutable state — static var creates test-isolation hazards (G-15 reset becomes critical instead of automatic via fresh .new() per test); (b) HP/Status needs to subscribe to GameBus signals via Callable identity — static-method Callable disconnect identity is undefined in GDScript 4.x for non-Object class references (same engine-level claim that rejected this form for InputRouter in ADR-0005). Pattern boundary explicitly says: stateless-static for systems CALLED; Node-based form for systems STATEFUL AND/OR LISTENING. HP/Status is BOTH."
    not_also_3: "ECS-style data + system separation (DOTS) — rejected per Alternative 4: not idiomatic to Godot 4.x; Godot's OO Node + Resource model fits this project's pattern (matches damage-calc / unit-role / hero-database / map-grid 4-precedent). Frame-by-frame iteration would violate ADR-0001 batching rule (line 252) — HP intake happens on attack events, not per-frame. Dictionary-per-unit map provides O(1) lookup needed for individual apply_damage calls."
    adr: docs/architecture/ADR-0010-hp-status.md
    reason: "Pattern boundary precedent extended from ADR-0005: stateless-static for systems CALLED (5-precedent ADR-0008→0007); Node-based form for systems STATEFUL AND/OR LISTENING (ADR-0005 InputRouter autoload Node + ADR-0010 HPStatusController battle-scoped Node). HP/Status is both stateful (per-unit current_hp + status_effects) AND listening (Turn Order signals). Battle-scoped lifecycle (vs autoload) chosen because GDD CR-1b mandates non-persistence between battles — automatic teardown alignment with BattleScene freeing is cleaner enforcement than manual reset. Reusable for future battle-scoped Node ADRs: Grid Battle (likely battle-scoped Node), AI System (likely battle-scoped Node), Battle HUD (likely battle-scoped Node Control)."
    referenced_by:
      - docs/architecture/ADR-0010-hp-status.md
      - docs/architecture/ADR-0005-input-handling.md  # pattern boundary precedent (Alt 4 stateless-static rejection)
      - docs/architecture/ADR-0004-map-grid-data-model.md  # battle-scoped Node lifecycle precedent
    added: 2026-04-30
    revised: ""

  - purpose: turn_order_module_form
    status: active
    api: "class_name TurnOrderRunner extends Node + battle-scoped child of BattleScene (created at battle-init via Battle Preparation, freed automatically with BattleScene per ADR-0002 SceneManager teardown — non-persistence enforced by lifecycle alignment per CR-1b matching ADR-0010 HPStatusController precedent) + Dictionary[int, UnitTurnState] keyed by unit_id (matches ADR-0001 unit_died(int) payload type + ADR-0010 unit_id Dictionary lock) + UnitTurnState RefCounted per-unit (NOT Resource — battle-scoped non-persistent; mirrors ADR-0010 UnitHPState rationale; snapshot() returns NEW instance via explicit field-by-field copy NOT duplicate()/duplicate_deep() per godot-specialist 2026-04-30 Item 3 RefCounted idiomatic pattern) + 3 mutator + 5 query public methods + 4 emitted GameBus signals (round_started + unit_turn_started + unit_turn_ended + victory_condition_detected; latter added 2026-04-30 via ADR-0011 same-patch ADR-0001 amendment) + 1 consumed signal (unit_died subscribed with Object.CONNECT_DEFERRED per ADR-0001 §5 deferred-connect mandate; R-1 mitigation for CR-7d counter-attack-during-T5 re-entrancy hazard) + 2 net-new tuning constants (ROUND_CAP, CHARGE_THRESHOLD) via BalanceConstants.get_const(key) per ADR-0006 (INIT_SCALE + INIT_CAP already owned by ADR-0009 — no duplicate registration). BI-6 transition uses _begin_round.call_deferred() Callable method-reference form per godot-specialist 2026-04-30 Item 6 (NOT string-based call_deferred per project deprecated-apis pattern)."
    not: "Autoload Node /root/TurnOrderRunner — rejected per Alternative 1: GDD CR-1b mandates queue + per-unit token state non-persistence between battles; autoload form requires explicit reset (extra mutation, easy to forget; failure mode if battle ends abnormally — forfeit, app suspend — leaves stale queue + per-unit states; first turn of next battle would inherit ghost data); battle-scoped form provides cleaner non-persistence enforcement (state freed automatically when BattleScene is freed). ADR-0010 HPStatusController is the closer precedent (battle-scoped, non-persistent, freed with BattleScene)."
    not_also: "Stateless-static utility class with static var _state_by_unit (5-precedent ADR-0008→0007 pattern) — rejected per Alternative 2: ARCHITECTURALLY INCOMPATIBLE per ADR-0005 §Alternative 4 + ADR-0010 §Alternative 3 pattern boundary. (a) Turn Order holds mutable state (_queue + _queue_index + _round_number + _unit_states) — static var creates test-isolation hazards (G-15 reset becomes critical instead of automatic via fresh .new() per test); (b) Turn Order subscribes to GameBus.unit_died via Callable identity — static-method Callable disconnect identity is undefined in GDScript 4.x for non-Object class references (same engine-level claim that rejected this form for InputRouter in ADR-0005 + HPStatusController in ADR-0010); (c) _queue_index advancement requires per-call mutation of caller-side state — stateless-static decomposes into static methods with mandatory mutable-Array-passing-by-reference, which is the WORSE form of state ownership (state ownership becomes invisible at call sites). Pattern boundary explicitly says: stateless-static for systems CALLED; Node-based form for systems STATEFUL AND/OR LISTENING. Turn Order is BOTH."
    not_also_2: "Hybrid query API as static methods + Node for state/signals — rejected per Alternative 3: bifurcates state ownership (static methods need to read _unit_states somehow — either get a Node reference at call time defeating the static API, OR duplicate state into class-level static variables triggering turn_order_static_var_state_addition forbidden_pattern + battle teardown leak risk). ADR-0005 + ADR-0010 already faced and rejected this — bifurcation creates two failure modes (stale static cache + Node not yet ready) where the unified Node form has zero. Damage Calc gets a TurnOrderRunner reference at construction time via Grid Battle's dependency injection — same pattern as how it gets HPStatusController per ADR-0012."
    not_also_3: "Per-unit Resource (UnitTurnState extends Resource with @export fields, .tres-authored) — rejected per Alternative 4: all UnitTurnState data is BATTLE-SCOPED RUNTIME state (token spent flags, accumulated_move_cost, acted_this_turn) with no design-time content to author. .tres authoring is misuse of the Resource system (mirrors ADR-0010 UnitHPState rejection rationale — RefCounted is the correct base class for battle-scoped non-persistent runtime state)."
    adr: docs/architecture/ADR-0011-turn-order.md
    reason: "Pattern boundary precedent EXTENDED at 3 ADRs: stateless-static for systems CALLED (5-precedent ADR-0008→0007); Node-based form for systems STATEFUL AND/OR LISTENING (ADR-0005 InputRouter autoload Node + ADR-0010 HPStatusController battle-scoped Node + ADR-0011 TurnOrderRunner battle-scoped Node). Turn Order is both stateful (_queue + _queue_index + _round_number + _unit_states + _round_state) AND listening (GameBus.unit_died from HP/Status). Battle-scoped lifecycle (vs autoload) chosen because GDD CR-1b mandates non-persistence between battles — automatic teardown alignment with BattleScene freeing is cleaner enforcement than manual reset (matches ADR-0010 HPStatusController rationale). Reusable for future battle-scoped Node ADRs: Grid Battle (likely battle-scoped Node — main orchestrator), AI System (likely battle-scoped Node — listener-heavy), Battle HUD (likely battle-scoped Node Control). Test seam pattern stable at 4 invocations: ADR-0005 _handle_event + ADR-0010 _apply_turn_start_tick + ADR-0012 _resolve_with_rng + ADR-0011 _advance_turn."
    referenced_by:
      - docs/architecture/ADR-0011-turn-order.md
      - docs/architecture/ADR-0010-hp-status.md  # battle-scoped Node lifecycle + state-holder + listener pattern precedent (Alt 3 stateless-static rejection)
      - docs/architecture/ADR-0005-input-handling.md  # pattern boundary precedent (Alt 4 stateless-static rejection)
      - docs/architecture/ADR-0002-scene-manager.md  # battle-scoped lifecycle teardown precedent
    added: 2026-04-30
    revised: ""

