    producer: damage-calc       # DamageCalc.resolve() — stateless static method on class_name DamageCalc
    consumers:
      - grid-battle             # sole caller per damage-calc.md CR-1 + AC-DC-42 (exactly 2 calls per primary HIT → counter; exactly 1 per primary HIT/MISS → no counter)
    adr: docs/architecture/ADR-0012-damage-calc.md
    method_signatures:
      - "DamageCalc.resolve(attacker: AttackerContext, defender: DefenderContext, modifiers: ResolveModifiers) -> ResolveResult"
    notes: "Stateless static method on class_name DamageCalc extends RefCounted. ZERO signals emitted (per ADR-0001 non-emitter list, line 375). ZERO signal subscriptions. ZERO instance state. ZERO outbound calls into mutator APIs — hp_status.apply_damage() is invoked by Grid Battle (NOT by DamageCalc) on HIT only. Per-call seeded RNG via ResolveModifiers.rng (typed RandomNumberGenerator, never Variant). Determinism contract: 1 randi_range per non-counter, 0 per counter, 0 per skill stub. Four typed RefCounted wrapper classes (AttackerContext, DefenderContext, ResolveModifiers, ResolveResult) replace the prior Dictionary payload — Array[StringName] passives are mandatory (Array[String] is a silent-wrong-answer hole per EC-DC-25 / AC-DC-51). All 11 tuning constants read via DataRegistry.get_const() — hardcoded literals are blocker bugs."
