      - "unit_died(unit_id: int)                                   # HPStatusController → TurnOrderRunner (CONSUMED; subscribed with Object.CONNECT_DEFERRED per ADR-0001 §5 deferred-connect mandate + ADR-0011 R-1 mitigation for counter-attack-during-T5 re-entrancy hazard CR-7d; handler _on_unit_died removes from _queue + _unit_states with R-2 defensive _unit_states.has() check)"
    direct_call_signatures:
      - "TurnOrderRunner.initialize_battle(unit_roster: Array[BattleUnit]) -> void  # Battle Preparation sole caller at battle-init; executes BI-1 through BI-5; BI-6 transitions _round_state to ROUND_STARTING via _begin_round.call_deferred() Callable method-reference form (NOT string-based call_deferred; godot-specialist 2026-04-30 Item 6); idempotent GameBus.unit_died.connect(_on_unit_died, Object.CONNECT_DEFERRED) on first call only"
      - "TurnOrderRunner.declare_action(unit_id: int, action: TurnOrderRunner.ActionType, target: ActionTarget) -> ActionResult  # Grid Battle BattleController (player input layer) OR AI System (request_action delegation at T4) sole callers; validates token availability + DEFEND_STANCE locks per CR-3 + CR-4; on success spends tokens + updates _unit_states[unit_id] + may emit unit_turn_ended at T6"
      - "TurnOrderRunner._advance_turn(unit_id: int) -> void  # TEST SEAM — production path is internal queue advancement in _on_unit_turn_completed; tests call directly to bypass GameBus signal infrastructure; PUBLIC for tests-namespace per ADR-0005 + ADR-0010 + ADR-0012 DI seam pattern (4-precedent extension); GDScript 4.x does not enforce leading-underscore as private"
      - "TurnOrderRunner.get_acted_this_turn(unit_id: int) -> bool  # Damage Calc per-attack call for Scout Ambush gate; returns _unit_states[unit_id].acted_this_turn or false for unknown unit_id (R-2 defensive); LOCKED unit_id: int (NOT StringName as ADR-0012 line 343 declares — advisory queued for next ADR-0012 amendment)"
      - "TurnOrderRunner.get_current_round_number() -> int  # Damage Calc per-attack call for Scout Ambush round-2+ gate; returns _round_number or 0 before BI-4 / R1"
      - "TurnOrderRunner.get_turn_order_snapshot() -> TurnOrderSnapshot  # Battle HUD + AI pull-based on round_started / unit_turn_ended / unit_died receipts; returns deep snapshot (TurnOrderSnapshot is RefCounted typed wrapper; consumer mutation of _queue or _unit_states via the snapshot forbidden per turn_order_consumer_mutation forbidden_pattern)"
      - "TurnOrderRunner.get_charge_ready(unit_id: int) -> bool  # Damage Calc per-attack call for Cavalry Charge passive (ADR-0009 passive_charge); returns _unit_states[unit_id].accumulated_move_cost >= BalanceConstants.get_const('CHARGE_THRESHOLD'); reset to 0 at T4 per F-2"
      - "TurnOrderRunner.get_unit_turn_state(unit_id: int) -> UnitTurnState  # AI System call for action selection context at T4; returns UnitTurnState.snapshot() defensive deep copy (NOT _unit_states[unit_id] directly — godot-specialist 2026-04-30 Item 3 field-by-field copy pattern, NOT duplicate()/duplicate_deep() since UnitTurnState is RefCounted not Resource)"
    notes: "TurnOrderRunner is the sole emitter of 4 Turn Order Domain signals per ADR-0001 §3 (round_started + unit_turn_started + unit_turn_ended + victory_condition_detected). The 4th signal victory_condition_detected was added to ADR-0001 via this ADR's same-patch amendment (§Migration Plan §0). Hybrid pattern (4 signals + 8 direct_call methods) preserves the sole-caller contract for declare_action (player input + AI) AND the per-attack synchronous query path for Scout Ambush gates (Damage Calc cannot wait for signal round-trip per AC-DC-42 call-count discipline established by ADR-0012). _advance_turn(unit_id) is the test seam (mirrors ADR-0005 _handle_event + ADR-0010 _apply_turn_start_tick + ADR-0012 _resolve_with_rng — 4-precedent extension). Carried advisory for next ADR-0012 amendment: parameter type unit_id: StringName at line 343 → unit_id: int to match ADR-0001 + ADR-0010 + ADR-0011 (queues with ADR-0001 line 168 + line 372 + ADR-0010 unit_id type cross-doc advisories from prior deltas). victory_condition_detected: int parameter passed as enum value {PLAYER_WIN=0, PLAYER_LOSE=1, DRAW=2} to keep payload simple; Grid Battle constructs the typed BattleOutcome Resource on receipt (chapter_id / final_round / surviving_units that Turn Order does not have)."
    referenced_by:
      - docs/architecture/ADR-0011-turn-order.md
      - docs/architecture/ADR-0001-gamebus-autoload.md  # 4 Turn Order Domain signals declared lines 152–155 (line 155 victory_condition_detected added 2026-04-30 via ADR-0011 same-patch amendment); single-emitter rule
      - docs/architecture/ADR-0010-hp-status.md  # ratifies HP/Status's unit_turn_started consumer contract; HPStatusController emits unit_died which TurnOrderRunner consumes
      - docs/architecture/ADR-0012-damage-calc.md  # ratifies get_acted_this_turn(unit_id: int) Scout Ambush gate (line 343 advisory carried) + adds get_current_round_number() round-2+ gate
    added: 2026-04-30
    revised: ""

