# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: per_frame_resource_load_polling
    status: active
    description: "Polling ResourceLoader.load_threaded_get_status (or any I/O status) from _process or _physics_process is banned. Use a Timer node at ≥100 ms cadence instead."
    why: "ADR-0001 §Implementation Guidelines §7 forbids emits from _process. Status polling in _process inevitably triggers emits (ui_input_unblock_requested on completion) from within the per-frame context, violating the ADR-0001 contract. Timer-based polling moves the emit out of _process into a discrete handler."
    adr: docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18

  - pattern: direct_scene_instantiation_across_boundary
    status: active
    description: "Systems must not directly call PackedScene.instantiate() or SceneTree.change_scene_to_packed() to cross the Overworld ↔ BattleScene boundary. Only SceneManager is allowed to perform the transition, and transitions are signal-driven (battle_launch_requested / battle_outcome_resolved)."
    why: "Ad-hoc scene instantiation across feature branches produces inconsistent scene trees, undefined co-subscriber handler ordering, and scene-reload hazards. Single-owner SceneManager ensures the deferred-free pattern is applied uniformly."
    adr: docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18

  - pattern: queue_free_battle_scene_without_deferral
    status: active
    description: "Freeing BattleScene directly (without call_deferred) inside a CONNECT_DEFERRED handler of battle_outcome_resolved is banned. Must use call_deferred('_free_battle_scene_and_restore_overworld') to push the free one additional frame."
    why: "Co-subscribers (ScenarioRunner) connect DEFERRED to the same signal. Handler execution order within a deferred frame is undefined. A direct queue_free from SceneManager's handler may free BattleScene before ScenarioRunner's same-frame handler completes, leaving ScenarioRunner with dangling node references. The extra-frame defer guarantees all same-frame deferred handlers complete first."
    adr: docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18

  - pattern: non_exported_save_field
    status: active
    description: "Every field on SaveContext, EchoMark, or any Resource reachable from SaveContext that must persist MUST be annotated with @export. Non-exported fields are silently dropped by ResourceSaver with no warning."
    why: "ADR-0003 defines SaveContext as the persistence contract. A missing @export is a silent data-loss bug that surfaces only when the field is read back and found to be the class default. This is the #1 footgun of the ResourceSaver pipeline. EchoMark in particular extends Resource, declares class_name EchoMark, and every persisted field @export-annotated — no exceptions."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: saf_external_save_path
    status: active
    description: "Writing save files anywhere other than user:// (specifically: Android SAF-backed external storage paths, content:// URIs, /sdcard/ paths, or any user-picker-provided destination) is banned for primary saves."
    why: "DirAccess.rename_absolute() atomicity is guaranteed only on same-filesystem POSIX rename (user:// on iOS NSApplicationSupportDirectory and Android internal /data/data/<pkg>/files). SAF-backed external paths route through a document provider that does NOT guarantee atomic rename — partial writes can survive, producing corrupt saves. Any user-facing 'export save' feature MUST be implemented as a COPY after the atomic primary save completes."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: cached_save_load
    status: active
    description: "Loading a save file via ResourceLoader without passing CACHE_MODE_IGNORE is banned. Every call site MUST be: ResourceLoader.load(path, '', ResourceLoader.CACHE_MODE_IGNORE)."
    why: "Godot's Resource cache is keyed by path. After SaveManager.save_checkpoint overwrites slot_1/ch_01_cp_2.res, a subsequent default-cache load returns the pre-write cached instance. Only surfaces on second load of the same slot in one session, which is why casual testing misses it. CACHE_MODE_IGNORE makes the load always hit disk."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: non_pure_migration_callable
    status: active
    description: "Migration functions registered in SaveMigrationRegistry._migrations MUST be pure functions operating only on the SaveContext argument. They MUST NOT close over (capture) any node, autoload, singleton, or object reference from the enclosing scope."
    why: "The migration registry is a static Dictionary; Callables stored in it are held for the registry's lifetime = process lifetime. Captured references are pinned alive, creating memory leaks and — worse — dangling references into freed scenes when a migration references, e.g., a ScenarioRunner node from a prior session. Purity is the contract."
    adr: docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18

  - pattern: tile_data_external_subresource
    status: active
    description: "TileData Resources MUST remain inline inside MapResource.tres files. Extracting TileData to shared .tres presets with UIDs (e.g., a shared 'mountain_preset.tres' referenced from many maps) is banned for as long as ADR-0004 stands. A refactor to shared presets requires a superseding ADR."
    why: "Godot 4.5+ Resource.duplicate_deep() only recursively clones EMBEDDED sub-resources. External UID-referenced sub-resources return the same shared instance. If TileData were extracted to a shared preset and a battle destroys a tile, the destruction state would mutate the shared preset and leak into every other map referencing the same preset. MVP is safe because TileData is inline; the constraint exists to prevent a silent correctness bug when someone 'refactors for reuse' later."
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18

  - pattern: astar_grid2d_for_tactical_pathfinding
    status: active
    description: "Godot's AStarGrid2D and NavigationServer2D / NavigationAgent2D MUST NOT be used for unit movement pathfinding on the tactical battle grid. Pathfinding on the tactical grid is custom Dijkstra inline on MapGrid per ADR-0004."
    why: "map-grid.md CR-6 explicitly rejects AStarGrid2D. Godot's grid-A* does not model the per-unit-type × per-terrain-type cost matrix required by ADR-0008 Terrain Effect; adapting it to this game's cost formula would require either overriding _compute_cost (slower than custom Dijkstra) or flattening the cost matrix into a weight-per-tile approximation (loses unit-type variance). NavigationServer2D is continuous-space mesh pathfinding — not a tile-step grid model. This ban applies ONLY to tactical battle pathfinding; overworld navigation (if ever added) may use any engine API without this constraint."
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18

  - pattern: map_grid_cache_sync_bypass
    status: active
    description: "MapGrid's Array[TileData] and parallel packed caches (PackedInt32Array for terrain_type/elevation/occupant_id/tile_state; PackedByteArray for is_passable_base) MUST be kept synchronized. Every mutation to a TileData field that has a cache MUST write through to the cache entry in the same call. No ad-hoc writes to one side are permitted. All mutations route through the three public mutation methods (set_occupant, clear_occupant, apply_tile_damage)."
    why: "The packed caches are a structural read-optimization for AC-PERF-2. Pathfinding and LoS hot paths read ONLY from the caches — they never dereference TileData. If a mutation updates the Array[TileData] but not the cache (or vice-versa), queries return stale data. This is a silent correctness bug that surfaces only when a query fires between the mutation and the missed cache update — exactly the timing casual testing misses. Single-mutation-entry-point discipline + unit tests on every mutation path is the mitigation."
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    added: 2026-04-18

  - pattern: damage_calc_signal_emission
    status: active
    description: "DamageCalc MUST NOT emit any GameBus signal, MUST NOT subscribe to any GameBus signal, and MUST NOT hold any signal connection. Damage Calc is on the ADR-0001 non-emitter list (line 375). The single legal communication channel is direct call: Grid Battle invokes DamageCalc.resolve(...) and consumes the ResolveResult return value."
    why: "Signal emission would (a) violate ADR-0001's non-emitter contract, (b) decouple AC-DC-42 call-count discipline (signal subscribers cannot be reliably counted without a registry layer), and (c) split the responsibility for hp_status.apply_damage() between Grid Battle and the signal handler — which path is canonical? The stateless-deterministic invariant collapses if signal-ordering races become possible. Static-lint enforces zero `signal` declarations and zero `connect(` / `emit_signal` calls in src/feature/damage_calc/."
    adr: docs/architecture/ADR-0012-damage-calc.md
    added: 2026-04-26

  - pattern: damage_calc_state_mutation
    status: active
    description: "DamageCalc MUST NOT declare any instance fields, MUST NOT declare any static fields (e.g., `static var _last_result`), and MUST NOT mutate any external state during resolve(). The class body contains only `static func` declarations (the public `resolve` plus private helpers). No `_init` constructor, no `_ready`, no `_process`. The `class_name DamageCalc extends RefCounted` form structurally enforces statelessness — instances are never constructed in production code; tests construct only for AC-DC-51(b) bypass-seam coverage. Optional `@abstract` decoration (Godot 4.5+) further hardens this by making `DamageCalc.new()` a parse error."
    why: "Per damage-calc.md CR-1: 'No internal mutable state, no signal emission, no I/O. Same inputs → same output.' State mutation breaks determinism (AC-DC-37, AC-DC-39 RNG replay), breaks call-count discipline (AC-DC-42), and breaks the signal-free contract (state changes invite signal-emit shortcuts). Memoization, caching, or 'optimization' state additions are blocker bugs — they trade correctness for imagined throughput gains that are unmeasurable against the 50µs avg / 1ms mobile p99 budget."
    adr: docs/architecture/ADR-0012-damage-calc.md
    added: 2026-04-26

  - pattern: damage_calc_dictionary_payload
    status: active
    description: "Grid Battle MUST NOT pass Dictionary-shaped payloads to DamageCalc.resolve(). The three arguments MUST be typed RefCounted wrappers (`AttackerContext`, `DefenderContext`, `ResolveModifiers`). Construction routes through the static `make(...)` factory on each wrapper class. Direct field-by-field construction (`var ctx = AttackerContext.new(); ctx.passives = [...]`) is reserved exclusively for AC-DC-51(b) bypass-seam tests."
    why: "Dictionary payloads silently re-open EC-DC-25 (Array[String] passive leakage — `&\"passive_charge\" in attacker.passives` returns false against String elements, P_mult stays 1.00 despite the unit having the passive) and AC-DC-51 (silent-fail StringName guard). The typed-RefCounted boundary catches mismatched element types at parameter-bind time (or via runtime type error), and the StringName literal comparison is the release-build defense layer. The current grid-battle.md:807-816 Dictionary-shaped payload is an anti-pattern carried from rev 2.2 brief; rev 2.3 of damage-calc.md fixed it. Reinstating Dictionary in any future story re-opens the silent-wrong-answer hole."
    adr: docs/architecture/ADR-0012-damage-calc.md
    added: 2026-04-26

  - pattern: hardcoded_damage_constants
    status: active
    description: "Any literal numeric constant in src/feature/damage_calc/*.gd that matches one of the 11 damage-calc constants (BASE_CEILING, DAMAGE_CEILING, COUNTER_ATTACK_MODIFIER, MIN_DAMAGE, MAX_DEFENSE_REDUCTION, MAX_EVASION, ATK_CAP, DEF_CAP, DEFEND_STANCE_ATK_PENALTY, CHARGE_BONUS, AMBUSH_BONUS, P_MULT_COMBINED_CAP) is a blocker bug. All 11 MUST be read via `DataRegistry.get_const(key)` at resolve-time (or cached at module-load via a thin `BalanceConstants` accessor — same call form, internal lazy-init only)."
    why: "The 11 constants are tuning surface owned by Balance/Data (#26). Hardcoding any of them silently breaks balance governance: a designer changing CHARGE_BONUS in entities.yaml from 1.20 to 1.15 to test feel sees no in-game change because the GDScript source baked in 1.20. The bug surfaces only when QA notices the disparity, by which point hours of tuning iteration have been wasted. Per balance-data.md, hardcoded values are a blocker bug. Static lint via grep for the 11 literals (1.20, 1.15, 83, 180, 0.5, 1, 30, 200, 105, 0.40, 1.31) inside src/feature/damage_calc/ — exception list maintained in tools/ci/ for false-positive numeric-coincidence cases (e.g., array indices)."
    adr: docs/architecture/ADR-0012-damage-calc.md
    added: 2026-04-26

  - pattern: unit_role_returned_array_mutation
    status: active
    description: "Caller of UnitRole.get_class_cost_table(unit_class) MUST NOT mutate the returned PackedFloat32Array. Per-call copy is the contract. Future caching optimizations that return a shared backing array (e.g., `static var _cached_table = ...; return _cached_table`) are blocker bugs without a superseding ADR. Source-comment in src/foundation/unit_role.gd above the method declaration must read: '# RETURNS PER-CALL COPY — DO NOT cache and return shared array.'"
    why: "GDScript has no const reference enforcement; a caller mutating a cached shared PackedFloat32Array would silently corrupt subsequent calls. Map/Grid Dijkstra calls this once per get_movement_range invocation — the per-call copy cost (Godot 4.x COW) is negligible against the per-Dijkstra-call inner loop. Risk classified as LOW probability / HIGH impact in ADR-0009 R-1. Mitigation: unit test in tests/unit/foundation/unit_role_test.gd::test_get_class_cost_table_caller_mutation_isolated — fetches table, mutates returned array, fetches again, asserts original values. Test is mandatory per ADR-0009 §Validation Criteria §6."
    adr: docs/architecture/ADR-0009-unit-role.md
    added: 2026-04-28

  - pattern: unit_role_signal_emission
    status: active
    description: "UnitRole MUST NOT declare any signal, MUST NOT emit any signal, MUST NOT subscribe to any signal, MUST NOT hold any signal connection. UnitRole is on the ADR-0001 non-emitter list. The single legal communication channel is direct call: consumers invoke the 8 public static methods (get_atk, get_phys_def, get_mag_def, get_max_hp, get_initiative, get_effective_move_range, get_class_cost_table, get_class_direction_mult) + read the const PASSIVE_TAG_BY_CLASS Dictionary. Static lint enforces zero `signal` declarations + zero `connect(` / `emit_signal(` calls in src/foundation/unit_role.gd."
    why: "Signal emission would (a) violate ADR-0001's non-emitter contract, (b) introduce signal-ordering hazards into a stateless calculator with 7 consumers each reading independently, and (c) split responsibility for derived-stat reads between direct-call and signal-handler paths — which path is canonical? The stateless-deterministic invariant collapses if signal-emit shortcuts become possible. Mirrors ADR-0012 forbidden_pattern damage_calc_signal_emission for the same architectural reason. Pattern stable at 2 invocations (Damage Calc + Unit Role)."
    adr: docs/architecture/ADR-0009-unit-role.md
    added: 2026-04-28

  - pattern: hero_database_signal_emission
    status: active
    description: "HeroDatabase MUST NOT declare any signal, MUST NOT emit any signal, MUST NOT subscribe to any signal, MUST NOT hold any signal connection. HeroDatabase is on the ADR-0001 non-emitter list. The single legal communication channel is direct call: consumers invoke the 6 public static methods (get_hero, get_heroes_by_faction, get_heroes_by_class, get_all_hero_ids, get_mvp_roster, get_relationships). Static-lint enforces zero `signal ` / `connect(` / `emit_signal(` matches in src/foundation/hero_database.gd + src/foundation/hero_data.gd."
    why: "Mirrors ADR-0012 damage_calc_signal_emission + ADR-0009 unit_role_signal_emission for the same architectural reason. Signal emission would (a) violate ADR-0001's non-emitter contract, (b) introduce signal-ordering hazards into a stateless query layer with 11+ consumers each reading independently, (c) split responsibility for data-load between direct-call and signal-handler paths — which path is canonical? The stateless-deterministic invariant collapses if signal-emit shortcuts become possible. Pattern stable at 4 invocations across Foundation/Core stateless calculators (BalanceConstants implicit + DamageCalc + UnitRole + HeroDatabase)."
    adr: docs/architecture/ADR-0007-hero-database.md
    added: 2026-04-29

  - pattern: hero_data_consumer_mutation
    status: active
    description: "Consumers of HeroDatabase.get_hero(...) / get_heroes_by_*(...) / get_mvp_roster() MUST NOT mutate any field of the returned HeroData Resource references. CR §Interactions '읽기 전용 계약' is the contract. Runtime stat changes (level-up, equipment, status effects, buffs/debuffs) belong to consumer-side base+modifier pattern: HP/Status maintains current_hp separately from HeroData.base_hp_seed; Character Growth maintains current_level + current_stats separately from HeroData.stat_might + growth_might multipliers; Equipment maintains slot fills separately from HeroData.default_class. Direct field mutation (`hero.stat_might = 99`) corrupts the shared session-persistent cache for ALL subsequent consumers — silent correctness bug surfacing as cross-system stat drift."
    why: "GDScript has no const-reference enforcement at runtime. The shared-reference contract is convention-only; this forbidden_pattern entry + ADR-0007 §6 + source-comment in hero_database.gd above each query method are the only structural defenses. Consumer-side base+modifier pattern is the established project discipline. A consumer mutating HeroData drifts every downstream system reading the same record (HP/Status, Damage Calc, Turn Order, AI all read stat_might transitively) — the bug surfaces as 'why does Damage Calc see 99 attack but the hero card shows 50?' The R-1 documented test in tests/unit/foundation/hero_database_consumer_mutation_test.gd asserts mutation IS visible across get_hero calls, proving the convention is the only defense (the test serves as documented fail-state, not a passing protective test)."
    adr: docs/architecture/ADR-0007-hero-database.md
    added: 2026-04-29

  - pattern: hardcoded_input_bindings
    status: active
    description: "Input action bindings (which keyboard keys / mouse buttons / touch gestures map to which 22-action vocabulary entries) MUST live in assets/data/input/default_bindings.json. NEVER hardcoded in any GDScript file. Runtime remap goes through InputRouter.set_binding(action: StringName, event: InputEvent) — Settings/Options sole caller. Tutorial / debug / dev-mode code MUST use set_binding (NOT direct InputMap.action_add_event mutation) so that InputRouter is the single source of truth for the live binding state."
    why: "ADR-0005 CR-1b: 'All default bindings live in assets/data/input/default_bindings.json. They are never hardcoded in GDScript. The system reads this file at startup and populates Godot's InputMap accordingly.' Hardcoding bypasses the JSON-as-source-of-truth contract, breaks AC-2 binding externalization (changing JSON should re-bind without code changes), and silently breaks Settings/Options remap (a remap modifies live bindings but hardcoded entries persist independently — silent stat-drift surfacing as 'why does Z still trigger when I rebound it?')."
    adr: docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30

  - pattern: emulate_mouse_from_touch_enabled
    status: active
    description: "[input_devices.pointing] emulate_mouse_from_touch=false MUST be set in project.godot for ALL builds (development, debug, release). Touch events MUST NOT synthesize fake mouse events. CI lint script tools/ci/lint_emulate_mouse_from_touch.sh greps project.godot per push; FAIL if the setting is true OR unset. The project's last-device-wins mode auto-detection (CR-2) requires unambiguous per-device-class events — emulation creates duplicate dispatch paths that double-fire actions and break TPP (Tap Preview Protocol) semantics."
    why: "ADR-0005 CR-2e + R-3 mitigation. Godot's IDE default for new projects is false but a project preset import or accidental UI-toggle in Project Settings can re-enable. The duplicate-event-firing surfaces as: a single touch tap fires unit_select TWICE (once via touch path, once via synthesized mouse path) — the second fire transitions OBSERVATION → UNIT_SELECTED → OBSERVATION on a second-tap interpretation, leaving the unit deselected. Silent correctness bug with no error log."
    adr: docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30

  - pattern: input_router_raw_event_consumer_outside_router
    status: active
    description: "Only InputRouter (src/foundation/input_router.gd) may consume raw InputEvent objects via _input(event) / _unhandled_input(event) / _gui_input(event)-based action interpretation. Other game systems MUST subscribe to GameBus.input_action_fired(action: StringName, ctx: InputContext) to receive interpreted actions. The single exception is Control nodes implementing _gui_input for their own UI interactions (button clicks, dialog confirms) — those events are handled by Control + may be marked accept_event() to prevent propagation to InputRouter."
    why: "ADR-0005 AC-1: 'No raw InputEvent is consumed by any system other than InputHandlingSystem [InputRouter].' Splitting raw event consumption across multiple systems creates: (a) duplicate dispatch paths (two systems both reacting to the same tap), (b) inconsistent state-machine awareness (system X reads raw event without checking _state == OBSERVATION; fires action during INPUT_BLOCKED), (c) breaks the 22-action vocabulary contract (system X invents its own action interpretation). All gameplay systems use the single GameBus signal subscription path. UI Controls are exempt because Control._gui_input is the engine's officially-sanctioned UI input path AND consumed Control events do NOT propagate to InputRouter (godot-specialist 2026-04-30 Implementation Notes Advisory A — engine-correct inheritance)."
    adr: docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30

  - pattern: input_router_signal_emission_outside_input_domain
    status: active
    description: "InputRouter (src/foundation/input_router.gd) MUST emit ONLY the 3 Input-domain signals on GameBus: input_action_fired / input_state_changed / input_mode_changed. InputRouter is on the ADR-0001 non-emitter list (line 372 region) for all 21 OTHER GameBus signals across 8 domains: Combat (e.g., damage_calculated — NOT emitted), Scenario (chapter_started — NOT emitted), Persistence (save_persisted — NOT emitted), Environment (tile_destroyed — NOT emitted), Grid Battle (battle_outcome_resolved — NOT emitted), Turn Order (round_started — NOT emitted), HP/Status (unit_died — NOT emitted), UI-Flow (ui_input_block_requested — CONSUMED, NOT emitted). Static lint asserts grep -c 'GameBus\\.' src/foundation/input_router.gd | grep -v 'GameBus\\.input_' returns 0 emit call sites."
    why: "Single-emitter rule per ADR-0001 single-owner contract. InputRouter is the sole emitter of Input-domain signals; emitting non-Input signals would violate the per-domain ownership invariant. Examples of common temptations to ban: emitting damage_calculated when the player's tap initiates an attack (wrong — Damage Calc is the source of truth); emitting battle_ended when the player presses end-game (wrong — Grid Battle owns this per ADR-0001 single-owner rule); emitting save_checkpoint_requested when the player opens the save menu (wrong — Scenario Progression / SceneManager are the canonical emitters per ADR-0003)."
    adr: docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30

  - pattern: input_router_input_blocked_drop_without_set_input_as_handled
    status: active
    description: "When InputRouter receives an InputEvent in INPUT_BLOCKED state (S5) and decides to silently drop it (per GDD EC-2 — grid actions G-1..G-10 silently dropped during enemy phase / animations), the implementation MUST call get_viewport().set_input_as_handled() BEFORE returning from _handle_event. Camera actions (C-1..C-4), open_unit_info (U-4), and overlay toggles (M-2, M-3) are NOT dropped in S5 — they continue to dispatch and DO NOT call set_input_as_handled (the engine forwards them to subsequent _unhandled_input handlers normally)."
    why: "godot-specialist 2026-04-30 Implementation Notes Advisory C. Without set_input_as_handled, a silently-dropped event in INPUT_BLOCKED state continues to propagate to ANY downstream _unhandled_input handler (test fixtures with additional listeners, future Tutorial overlay nodes, debug overlay). This breaks the 'silent drop' contract — the event was NOT silent, it was visibly relayed to other handlers. The set_input_as_handled call is the engine's official 'event consumed, do not propagate further' marker. Static lint asserts the INPUT_BLOCKED arm of _handle_event contains the call."
    adr: docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30

  - pattern: input_router_static_var_state_addition
    status: active
    description: "InputRouter (src/foundation/input_router.gd) MUST NOT introduce static var fields for caching, optimization, or any other purpose. All mutable state lives in instance vars (_state, _active_mode, _pre_menu_state, _undo_windows, _input_blocked_reasons, _bindings). Future caching needs MUST extend the existing instance var pattern (e.g., add _cached_action_lookup: Dictionary instance var; reset in before_test() alongside other instance vars). The 5-precedent stateless-static utility class form (ADR-0008 → 0006 → 0012 → 0009 → 0007) is explicitly NOT applicable to InputRouter (Alternative 4 rejected for engine-level structural incompatibility — see ADR-0005 §Alternatives)."
    why: "ADR-0005 R-4 mitigation. Adding static var to InputRouter would: (a) break the test-isolation contract (G-15-style obligation requires before_test() reset; static vars persist across test cases unless explicitly reset, replicating the ADR-0006 BalanceConstants test-leakage problem), (b) drift the module form away from the Autoload Node pattern (Alternatives 1/4 rejection rationale), (c) introduce a hybrid stateful-Node + stateless-static pattern that no other ADR follows. The stateless-static pattern is for systems that are CALLED (Damage Calc / Unit Role / Hero DB / Balance/Data / Terrain Effect); InputRouter is event-listening — instance vars are the correct discipline."
    adr: docs/architecture/ADR-0005-input-handling.md
    added: 2026-04-30

  - pattern: hp_status_consumer_mutation
    status: active
    description: "Consumers of HPStatusController.get_status_effects(unit_id) MUST NOT mutate the returned Array[StatusEffect] OR any StatusEffect instance fields (effect_id / remaining_turns / modifier_targets / tick_effect / source_unit_id). The shallow-copy returned by get_status_effects shares StatusEffect Resource references with HPStatusController's authoritative state — direct mutation (`effects[0].remaining_turns = 99`) corrupts the controller's per-unit state for ALL subsequent reads. ADR-0010 §5 'Consumer mutation forbidden' contract. Battle HUD must read remaining_turns for icon display; AI must read modifier_targets for threat eval; both are READ-ONLY consumers. Mutation must go through apply_status / apply_damage / apply_heal / _apply_turn_start_tick mutator paths only."
    why: "Mirrors ADR-0007 hero_data_consumer_mutation precedent (Hero DB shared-reference contract). GDScript has no const-reference enforcement at runtime; the shared-reference contract is convention-only; this forbidden_pattern entry + ADR-0010 §5 source-comment + R-5 documented test (tests/unit/core/hp_status_consumer_mutation_test.gd asserts mutation IS visible across get_status_effects calls, proving the convention is the only defense) are the only structural defenses. A consumer mutating returned effects drifts every downstream system reading the same UnitHPState — the bug surfaces as 'why does Battle HUD show DEMORALIZED for 99 turns?' or 'why does Damage Calc see ATK +200% from a buff that should have been -25%?'. Static-lint check via grep is impractical (mutation can occur via any field assignment); fixture test serves as documented fail-state."
    adr: docs/architecture/ADR-0010-hp-status.md
    added: 2026-04-30

  - pattern: hp_status_external_current_hp_write
    status: active
    description: "External systems MUST NOT directly write `unit_hp_state.current_hp = N` OR mutate UnitHPState fields outside HPStatusController. All HP changes MUST flow through the 4 sanctioned mutator paths: HPStatusController.apply_damage (CR-3 intake pipeline) / apply_heal (CR-4 healing pipeline) / apply_status (CR-5 status effect application; DoT may indirectly reduce HP via _apply_turn_start_tick) / initialize_unit (CR-1a battle-init only). Skills, items, scenario events, AI, Grid Battle, Damage Calc — NONE may bypass these mutators. The CR-2 invariant `0 ≤ current_hp ≤ max_hp` is enforced ONLY at the mutator boundaries; bypassing them creates state corruption (e.g., `current_hp = -5` ghost-alive unit, or `current_hp = max_hp + 50` overheal violating CR-4a)."
    why: "ADR-0010 CR-2 HP range invariant enforcement strategy. Direct field write bypasses MIN_DAMAGE floor (CR-9), DEFEND_STANCE -50% reduction (CR-6 SE-3), Shield Wall passive (CR-3 Step 1), unit_died emission (CR-8a), DEMORALIZED radius propagation (CR-8c), overheal prevention (CR-4a), dead-unit-cannot-heal check (CR-4b). The 4 mutator methods encapsulate the invariants — direct write defeats the encapsulation and silently corrupts gameplay state. Bug surface: 'why did this unit survive a 999-damage hit?' (because external code bypassed apply_damage and just decremented current_hp without checking source_flags or attack_type). Static-lint check: `grep -E 'unit_hp_state\\.current_hp\\s*=|state\\.current_hp\\s*=' src/` must return zero matches OUTSIDE src/core/hp_status_controller.gd."
    adr: docs/architecture/ADR-0010-hp-status.md
    added: 2026-04-30

  - pattern: hp_status_signal_emission_outside_unit_died
    status: active
    description: "HPStatusController (src/core/hp_status_controller.gd) MUST emit ONLY the unit_died(unit_id: int) signal on GameBus per ADR-0001 line 155. HP/Status is non-emitter by behavior for all OTHER 21 GameBus signals across 8 domains: Input (input_action_fired — NOT emitted), Combat (damage_calculated — NOT emitted), Scenario (chapter_started — NOT emitted), Persistence (save_persisted — NOT emitted), Environment (tile_destroyed — NOT emitted), Grid Battle (battle_outcome_resolved — NOT emitted), Turn Order (round_started — NOT emitted; HP/Status CONSUMES unit_turn_started but does not emit), UI-Flow (ui_input_block_requested — NOT emitted). Static lint asserts `grep -c 'GameBus\\.' src/core/hp_status_controller.gd | grep -v '^GameBus\\.unit_died'` returns 0 emit call sites; AND `grep -c 'GameBus\\.unit_died\\.emit(' src/core/hp_status_controller.gd` returns ≥2 (apply_damage Step 4 + _apply_turn_start_tick DoT-kill branch)."
    why: "Single-emitter rule per ADR-0001 single-owner contract. HPStatusController is the sole emitter of unit_died; emitting non-HP/Status-domain signals would violate the per-domain ownership invariant. Examples of common temptations to ban: emitting damage_calculated when apply_damage processes a hit (wrong — Damage Calc is the source of truth); emitting battle_ended when last unit dies (wrong — Grid Battle owns this per ADR-0001 single-owner rule); emitting hp_changed for HUD updates (wrong — Battle HUD polls via get_current_hp query OR a future Battle HUD ADR may add hp_changed via additive ADR-0001 amendment, but ADR-0010 MVP does NOT introduce additional HP/Status-domain signals); emitting status_effect_applied for HUD updates (wrong — same polling rationale)."
    adr: docs/architecture/ADR-0010-hp-status.md
    added: 2026-04-30

  - pattern: hp_status_static_var_state_addition
    status: active
    description: "HPStatusController (src/core/hp_status_controller.gd) MUST NOT introduce static var fields for caching, optimization, or any other purpose. All mutable state lives in instance vars (_state_by_unit Dictionary, plus any future _cached_X instance vars). Future caching needs MUST extend the existing instance var pattern (e.g., add _action_handler_cache: Dictionary instance var; reset implicitly via fresh HPStatusController.new() per battle). The 5-precedent stateless-static utility class form (ADR-0008 → 0006 → 0012 → 0009 → 0007) is explicitly NOT applicable to HPStatusController (Alternative 3 rejected for engine-level structural incompatibility — see ADR-0010 §Alternatives Considered)."
    why: "ADR-0010 R-4 mitigation. Adding static var to HPStatusController would: (a) break the non-persistence contract (CR-1b mandates HP state resets between battles; battle-scoped instance vars reset automatically via fresh `.new()`; static vars would persist across battles requiring explicit `static var X = {}` reset call that is easy to forget — same hazard ADR-0006 BalanceConstants documented), (b) drift the module form away from the battle-scoped Node pattern (Alternative 3 rejection rationale: stateless-static for systems CALLED, Node-based form for systems STATEFUL AND/OR LISTENING; HP/Status is both), (c) introduce a hybrid battle-scoped-Node + stateless-static pattern that no other ADR follows. Static-lint check: `grep -c '^static var' src/core/hp_status_controller.gd` returns 0."
    adr: docs/architecture/ADR-0010-hp-status.md
    added: 2026-04-30

  - pattern: turn_order_consumer_mutation
    status: active
    description: "Consumers of TurnOrderRunner read-only query API (Damage Calc + Battle HUD + AI + Formation Bonus + Grid Battle + Scenario Progression) MUST NOT mutate UnitTurnState or TurnOrderSnapshot or TurnOrderEntry instances returned by get_unit_turn_state(unit_id) / get_turn_order_snapshot() / get_turn_order_snapshot().queue[i]. The defensive snapshot pattern (UnitTurnState.snapshot() returns NEW UnitTurnState via explicit field-by-field copy per godot-specialist 2026-04-30 Item 3 RefCounted idiomatic pattern) creates value-distinct copies, but consumer-side mutation of the snapshot is still forbidden — implementation must treat returned values as immutable views. Static lint asserts: any consumer .gd file containing `unit_state.move_token_spent =` / `unit_state.action_token_spent =` / `unit_state.accumulated_move_cost =` / `unit_state.acted_this_turn =` / `unit_state.turn_state =` / `snapshot.queue = ` / `snapshot.queue.append(` / `snapshot.queue.remove_at(` outside src/core/turn_order_runner.gd flags as violation."
    why: "ADR-0011 §Decision §Forbidden patterns + R-2 mitigation. Consumer mutation of returned snapshots would: (a) decouple consumer-side mutation from TurnOrderRunner's authoritative state (consumer mutates copy → believes state changed → next get_X call returns un-mutated original → consumer-side bug surface); (b) defeat the test-isolation guarantee (per-test fresh TurnOrderRunner.new() requires snapshots to be value-pure; consumer mutation creates implicit shared state); (c) create a shadow-state hazard mirror to ADR-0010 hp_status_consumer_mutation forbidden_pattern. Mitigation pattern: consumers that need to project / filter the snapshot should construct a NEW Array (e.g., AI's `var threats := snapshot.queue.filter(func(e): return not e.is_player_controlled)`) — never mutate the snapshot in place."
    adr: docs/architecture/ADR-0011-turn-order.md
    added: 2026-04-30

  - pattern: turn_order_external_queue_write
    status: active
    description: "_queue + _unit_states + _queue_index + _round_number + _round_state instance fields of TurnOrderRunner MUST be modified ONLY inside src/core/turn_order_runner.gd. Public API exposes mutators via 3 methods only (initialize_battle / declare_action / _advance_turn). External code MUST NOT assign to TurnOrderRunner._queue / TurnOrderRunner._unit_states / TurnOrderRunner._queue_index / TurnOrderRunner._round_number / TurnOrderRunner._round_state. Static lint asserts: any .gd file outside src/core/turn_order_runner.gd containing `turn_order._queue =` / `turn_order._unit_states =` / `turn_order._queue_index =` / `turn_order._round_number =` / `turn_order._round_state =` (or capitalized variants) flags as violation."
    why: "ADR-0011 §Decision §Forbidden patterns. External writes to Turn Order's authoritative state would: (a) break the single-writer invariant (TurnOrderRunner is the sole authority for queue order + per-unit token state + round counter; external writes create race conditions and ownership ambiguity matching forbidden_patterns.direct_cross_system_state_write); (b) bypass declare_action's validation gates (token availability + DEFEND_STANCE locks per CR-3 + CR-4) creating inconsistent state where flags say 'token spent' but no action was actually resolved; (c) violate the architecture registry state_ownership.turn_order_runtime_state.write_access: turn-order-only contract."
    adr: docs/architecture/ADR-0011-turn-order.md
    added: 2026-04-30

  - pattern: turn_order_signal_emission_outside_domain
    status: active
    description: "TurnOrderRunner (src/core/turn_order_runner.gd) MUST emit ONLY the 4 Turn Order Domain signals on GameBus per ADR-0001 lines 152–155: round_started + unit_turn_started + unit_turn_ended + victory_condition_detected (latter added 2026-04-30 via ADR-0011 same-patch ADR-0001 amendment). TurnOrderRunner is non-emitter by behavior for all OTHER 21 GameBus signals across 8 domains: Input (input_action_fired — NOT emitted), Combat (damage_calculated — NOT emitted), Scenario (chapter_started — NOT emitted), Persistence (save_persisted — NOT emitted), Environment (tile_destroyed — NOT emitted), Grid Battle (battle_outcome_resolved — NOT emitted; Turn Order emits victory_condition_detected which Grid Battle consumes + emits authoritative battle_outcome_resolved per ADR-0001 line 301 single-owner rule), HP/Status (unit_died — NOT emitted; Turn Order CONSUMES unit_died for queue removal but does not emit), UI-Flow (ui_input_block_requested — NOT emitted). Static lint asserts `grep -c 'GameBus\\.' src/core/turn_order_runner.gd | grep -vE '^GameBus\\.(round_started|unit_turn_started|unit_turn_ended|victory_condition_detected)\\.emit'` returns 0 emit call sites for non-domain signals; AND `grep -c 'GameBus\\.\\(round_started\\|unit_turn_started\\|unit_turn_ended\\|victory_condition_detected\\)\\.emit(' src/core/turn_order_runner.gd` returns ≥4 (one per domain signal at R4 / T4 / T6 / T7+RE2 lifecycle points)."
    why: "Single-emitter rule per ADR-0001 single-owner contract. TurnOrderRunner is the sole emitter of 4 Turn Order Domain signals; emitting non-Turn-Order-domain signals would violate the per-domain ownership invariant. Examples of common temptations to ban: emitting damage_calculated when an attack action resolves through declare_action (wrong — Damage Calc is the source of truth via direct_call return value); emitting battle_outcome_resolved when victory is detected (wrong — Grid Battle owns the typed BattleOutcome Resource emission per ADR-0001 line 301 single-owner rule; Turn Order emits the bridge signal victory_condition_detected only); emitting unit_died when a unit's _on_unit_died handler removes it from queue (wrong — HP/Status is the sole emitter of unit_died per ADR-0010 + ADR-0001 line 155); emitting input_action_fired when player taps DECLARE button (wrong — InputRouter owns Input domain signals per ADR-0005)."
    adr: docs/architecture/ADR-0011-turn-order.md
    added: 2026-04-30

  - pattern: turn_order_static_var_state_addition
    status: active
    description: "TurnOrderRunner (src/core/turn_order_runner.gd) MUST NOT introduce static var fields for caching, optimization, or any other purpose. All mutable state lives in instance vars (_queue Array[int], _queue_index int, _round_number int, _unit_states Dictionary[int, UnitTurnState], _round_state RoundState enum, plus any future _cached_X instance vars). Future caching needs MUST extend the existing instance var pattern (e.g., add _initiative_cache: Dictionary[int, int] instance var; reset implicitly via fresh TurnOrderRunner.new() per battle). The 5-precedent stateless-static utility class form (ADR-0008 → 0006 → 0012 → 0009 → 0007) is explicitly NOT applicable to TurnOrderRunner (Alternative 2 rejected for engine-level structural incompatibility — see ADR-0011 §Alternatives Considered)."
    why: "ADR-0011 R-3 + R-5 mitigation. Adding static var to TurnOrderRunner would: (a) break the non-persistence contract (CR-1b mandates queue + per-unit token state + round counter reset between battles; battle-scoped instance vars reset automatically via fresh `.new()`; static vars would persist across battles requiring explicit `static var X = {}` reset call that is easy to forget — same hazard ADR-0006 BalanceConstants documented + ADR-0010 hp_status_static_var_state_addition forbidden_pattern), (b) drift the module form away from the battle-scoped Node pattern (Alternative 2 rejection rationale: stateless-static for systems CALLED, Node-based form for systems STATEFUL AND/OR LISTENING; Turn Order is both per ADR-0010 + ADR-0005 pattern boundary), (c) introduce a hybrid battle-scoped-Node + stateless-static pattern that no other ADR follows. Static-lint check: `grep -c '^static var' src/core/turn_order_runner.gd` returns 0."
    adr: docs/architecture/ADR-0011-turn-order.md
    added: 2026-04-30

  - pattern: turn_order_typed_array_reassignment
    status: active
    description: "TurnOrderRunner._queue: Array[int] MUST be mutated in-place via .clear() + .append_array(new_list) — MUST NOT be reassigned via _queue = new_list. Same discipline applies to TurnOrderSnapshot.queue: Array[TurnOrderEntry] (constructed once at snapshot time; never reassigned). Static lint asserts: src/core/turn_order_runner.gd contains zero occurrences of `_queue = ` (assignment to typed Array[int] field) outside `func _ready` or `func _init` initializer; codify pattern via test that asserts in-place mutation preserves Array[int] type info under repeated R3 queue rebuilds + G-15 before_test resets."
    why: "godot-specialist 2026-04-30 Item 8 + G-2 prevention pattern. Typed array reassignment in GDScript 4.4+ has documented type-info-loss hazards under specific G-15 test reset patterns (cf. ADR-0007 + ADR-0009 godot-specialist reviews — `var result: Array[T] = []` + .append() + return result discipline). For TurnOrderRunner._queue: (a) reassigning to a new Array[int] could silently drop the int type parameterization if the right-hand side originated from a typed Array operation that returned generic Array (cf. .filter() / .map() return type quirks); (b) the in-place pattern (.clear() + .append_array()) preserves the field's static type binding through R3 queue rebuilds + G-15 test resets; (c) consistent with the ADR-0010 + ADR-0005 G-15 reset discipline that uses `.clear()` for Dictionary fields. The pattern is a load-bearing project discipline for typed Array fields under repeated reset cycles."
    adr: docs/architecture/ADR-0011-turn-order.md
    added: 2026-04-30

