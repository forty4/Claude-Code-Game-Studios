# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-04-18"
# 2026-04-18: ADR-0003 Save/Load — added save_persistence_lifecycle interface,
# save_serialization / save_atomic_write / save_load_cache API decisions,
# 4 new forbidden patterns, 2 new state_ownership entries.
# 2026-04-18: ADR-0004 Map/Grid — added tile_grid_runtime_state + tile_data_schema
# state_ownership, map_grid_queries (direct_call) + environment_events (signal)
# interfaces, 4 API decisions (flat-array storage, packed-cache hot-path,
# custom-Dijkstra pathfinding, .tres→.res authoring pipeline), 3 forbidden
# patterns (tile_data_external_subresource, astar_grid2d_for_tactical_pathfinding,
# map_grid_cache_sync_bypass).

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: scene_lifecycle_state
    status: active
    owner_system: scene-manager
    adr: docs/architecture/ADR-0002-scene-manager.md
    interface: "SceneManager.state (read-only State enum: IDLE, LOADING_BATTLE, IN_BATTLE, RETURNING_FROM_BATTLE, ERROR). Write access: internal signal handlers only."
    write_access: scene-manager-only
    referenced_by:
      - docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18
    revised: ""

  - state: scene_loading_progress
    status: active
    owner_system: scene-manager
    adr: docs/architecture/ADR-0002-scene-manager.md
    interface: "SceneManager.loading_progress (read-only float, [0.0, 1.0]). Valid only when state == LOADING_BATTLE. UI reads via property query per ADR-0001 §5 — NOT via bus traffic."
    write_access: scene-manager-only
    referenced_by:
      - docs/architecture/ADR-0002-scene-manager.md
    added: 2026-04-18
    revised: ""

  - state: save_active_slot
    status: active
    owner_system: save-manager
    adr: docs/architecture/ADR-0003-save-load.md
    interface: "SaveManager.active_slot (read-only int, range [1, SLOT_COUNT]). Mutated only via SaveManager.set_active_slot(slot: int). Determines which slot_X/ directory save_checkpoint writes to and load_latest_checkpoint reads from."
    write_access: save-manager-only
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
    added: 2026-04-18
    revised: ""

  - state: save_context_schema
    status: active
    owner_system: save-manager
    adr: docs/architecture/ADR-0003-save-load.md
    interface: "SaveContext Resource class (src/core/save_context.gd). All fields @export-annotated. SaveContext.schema_version is authoritative for migration routing. Current schema_version = 1. Changes require a registry entry in SaveMigrationRegistry._migrations keyed on the previous version."
    write_access: save-manager-only  # SaveContext instances are written by gameplay; schema definition is owned by SaveManager
    referenced_by:
      - docs/architecture/ADR-0003-save-load.md
      - design/gdd/scenario-progression.md  # defines the payload fields
    added: 2026-04-18
    revised: ""

  - state: tile_grid_runtime_state
    status: active
    owner_system: map-grid
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    interface: "MapGrid Node (battle-scoped child of BattleScene). Holds a duplicate_deep() clone of the disk MapResource as the authoritative source plus parallel PackedInt32Array/PackedByteArray caches for hot-path queries. 9 read-only query methods are public (get_tile, get_movement_range, get_path, get_attack_range, get_attack_direction, get_adjacent_units, get_occupied_tiles, has_line_of_sight, get_map_dimensions). Mutation API (set_occupant, clear_occupant, apply_tile_damage) is convention-scoped to Grid Battle. MapGrid is freed when BattleScene is freed — zero cross-battle state."
    write_access: grid-battle-only  # convention (no runtime access control in GDScript); enforced in code review
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
      - design/gdd/map-grid.md
      - design/gdd/grid-battle.md  # consumes mutation API
      - design/gdd/terrain-effect.md  # consumes terrain_type field
    added: 2026-04-18
    revised: ""

  - state: tile_data_schema
    status: active
    owner_system: map-grid
    adr: docs/architecture/ADR-0004-map-grid-data-model.md
    interface: "TileData Resource class (src/core/tile_data.gd). All fields @export-annotated (coord, terrain_type, elevation, tile_state, is_destructible, destruction_hp, occupant_id, occupant_faction, is_passable_base). MapResource.terrain_version is authoritative for schema evolution; current version = 1. Schema changes follow ADR-0003 migration pattern (version bump + optional migration Callable). TileData MUST remain inline inside MapResource.tres — see forbidden_patterns.tile_data_external_subresource."
    write_access: map-grid-only  # schema definition; runtime instances written by MapGrid during mutation
    referenced_by:
      - docs/architecture/ADR-0004-map-grid-data-model.md
      - design/gdd/map-grid.md
    added: 2026-04-18
    revised: ""

