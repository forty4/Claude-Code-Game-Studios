name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gdunit4:
    name: GdUnit4 (Godot 4.6)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Required by dorny/test-reporter@v3 inside MikeSchulze/gdUnit4-action@v1
    # to publish check-run results. Without checks:write, the action fails
    # with "Resource not accessible by integration" even when tests pass.
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Lint per-frame emit ban (ADR-0001 §Implementation Guidelines §7)
        run: bash tools/ci/lint_per_frame_emit.sh

      - name: Lint save paths (ADR-0003 §Atomicity + TR-save-load-006, V-10)
        run: bash tools/ci/lint_save_paths.sh

      - name: Lint BattleOutcome.Result enum append-only (ADR-0003 §Schema Stability + TR-save-load-005)
        run: bash tools/ci/lint_enum_append_only.sh

      - name: Run GdUnit4 tests
        uses: MikeSchulze/gdUnit4-action@v1
        env:
          # Pass-11a.1 (grid-battle.md AC-GB-24): skip perf-budget assertions
          # on headless Linux runners. Rationale: process_frame timing is
          # non-deterministic without vsynced display; assertions would flake.
          # Reference-hardware perf validation moves to perf-nightly.yml (TBD).
          SKIP_PERF_BUDGETS: "1"
        with:
          godot-version: '4.6'
          godot-status: 'stable'
          paths: |
            tests/unit
            tests/integration
          timeout: 10
          retries: 0
          report-name: gdunit4-report

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdunit4-report
          path: reports/
          retention-days: 14
