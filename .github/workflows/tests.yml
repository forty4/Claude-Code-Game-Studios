name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gdunit4:
    name: GdUnit4 (Godot 4.6)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run GdUnit4 tests
        uses: MikeSchulze/gdUnit4-action@v1
        env:
          # Pass-11a.1 (grid-battle.md AC-GB-24): skip the 120ms UI-GB-04
          # render-budget assertion on headless CI without reference GPU.
          # Reference-hardware perf runs move to .github/workflows/perf-nightly.yml
          # (NOT YET AUTHORED; see grid-battle.md AC-GB-24 for spec).
          SKIP_PERF_BUDGETS: "1"
        with:
          godot-version: '4.6'
          godot-status: 'stable'
          paths: |
            tests/unit
            tests/integration
          timeout: 10
          retries: 0
          report-name: gdunit4-report

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdunit4-report
          path: reports/
          retention-days: 14
